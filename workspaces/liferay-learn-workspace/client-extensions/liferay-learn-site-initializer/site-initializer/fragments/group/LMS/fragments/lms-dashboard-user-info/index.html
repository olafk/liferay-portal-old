	user = restClient.get("/headless-admin-user/v1.0/user-accounts/${themeDisplay.getUserId()}")
/]

<div>
	<h3 class="mb-3">User Information</h3>

	<p><span class="font-weight-bold">Username: </span>${user.name}</p>
	<p><span class="font-weight-bold">Email: </span> ${user.emailAddress}</p>
</div>
