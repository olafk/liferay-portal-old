components:
    schemas:
        TestrayBuildAutofill:
            properties:
                caseAmount:
                    format: int32
                    type: integer
        TestrayCaseResultComparison:
            properties:
                error1:
                    type: string
                error2:
                    type: string
                id1:
                    format: int64
                    type: integer
                id2:
                    format: int64
                    type: integer
                issue1:
                    type: string
                issue2:
                    type: string
