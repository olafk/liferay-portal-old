                    type: string
                priority:
                    type: integer
                status1:
                    type: string
                status2:
                    type: string
                testrayCaseId:
                    format: int64
                    type: integer
                testrayComponentName:
                    type: string
                testrayTeamId:
                    format: int64
                    type: integer
            type: object
        TestrayCaseTypeMetric:
            properties:
                testrayCaseTypeId:
                    format: int64
                    type: integer
                testrayCaseTypeName:
                    type: string
                testrayStatusMetric:
                    $ref: "#/components/schemas/TestrayStatusMetric"
            type: object
        TestrayComponentMetric:
            properties:
                testrayComponentId:
                    format: int64
                    type: integer
                testrayComponentName:
                    type: string
                testrayStatusMetric:
                    $ref: "#/components/schemas/TestrayStatusMetric"
            type: object
        TestrayRoutineMetric:
            properties:
                testrayBuildDueDate:
                    type: string
                testrayRoutineId:
                    format: int64
                    type: integer
                testrayRoutineName:
                    type: string
                testrayStatusMetric:
                    $ref: "#/components/schemas/TestrayStatusMetric"
            type: object
        TestrayRunComparison:
            properties:
                results:
                    items:
                        type: object
                    type: array
                testrayCaseResultComparisons:
                    items:
                        $ref: "#/components/schemas/TestrayCaseResultComparison"
                    type: array
            type: object
        TestrayRunMetric:
            properties:
                testrayRunId:
                    format: int64
                    type: integer
                testrayRunName:
                    type: string
                testrayRunNumber:
                    format: int64
                    type: integer
                testrayStatusMetric:
                    $ref: "#/components/schemas/TestrayStatusMetric"
            type: object
        TestrayRunQuickComparison:
            properties:
                runId:
                    format: int64
                    type: integer
            type: object
        TestrayStatusMetric:
            properties:
                blocked:
                    format: int64
                    type: integer
                failed:
                    format: int64
                    type: integer
                inProgress:
                    format: int64
                    type: integer
                passed:
                    format: int64
                    type: integer
                testfix:
                    format: int64
                    type: integer
                total:
                    format: int64
                    type: integer
                untested:
                    format: int64
                    type: integer
            type: object
        TestrayTeamMetric:
            properties:
                testrayStatusMetric:
                    $ref: "#/components/schemas/TestrayStatusMetric"
                testrayTeamId:
                    format: int64
                    type: integer
                testrayTeamName:
                    type: string
            type: object
        TestrayTestFlow:
            properties:
                caseResultAmount:
                    format: int32
                    type: integer
                comment:
                    type: string
                dueStatus:
                    type: string
                issues:
                    type: string
                mbMessageId:
                    format: int64
                    type: integer
                mbThreadId:
                    format: int64
                    type: integer
                subtaskAmount:
                    format: int32
                    type: integer
                userId:
                    format: int64
                    type: integer
            type: object
        TestrayTestSuite:
            properties:
                fileName:
                    type: string
                runtime:
                    format: int64
                    type: integer
