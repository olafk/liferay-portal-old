##
## Test Suites
##

    modified.files.includes[relevant][gogo-shell-rule]=**

    relevant.rule.names=\
        gogo-shell-rule

    test.batch.names[relevant][gogo-shell-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][gogo-shell-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][gogo-shell-rule]=\
        apps/gogo-shell/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][gogo-shell-rule]=\
        apps/gogo-shell/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][gogo-shell-rule]=\
        (testray.main.component.name == "Gogo Shell")

