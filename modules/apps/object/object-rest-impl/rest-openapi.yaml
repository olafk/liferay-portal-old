components:
    schemas:
        AuditEvent:
            properties:
                auditFieldChanges:
                    items:
                        $ref: "#/components/schemas/AuditFieldChange"
                    readOnly: true
                    type: array
                creator:
                    $ref: ../../headless/headless-delivery/headless-delivery-impl/rest-openapi.yaml#Creator
                    readOnly: true
                dateCreated:
                    format: date
                    readOnly: true
                    type: string
                eventType:
                    readOnly: true
                    type: string
        AuditFieldChange:
            properties:
                name:
                    type: string
                newValue:
                    type: object
                oldValue:
                    type: object
        FileEntry:
            properties:
                externalReferenceCode:
                    type: string
                fileBase64:
                    # @review
                    description:
                        optional field with the content of the document in Base64, can be embedded with nestedFields
                        (the format of the nested field must be `<attachment field name>.fileBase64`)
                    type: string
                fileURL:
                    # @review
                    description:
                        optional field that specifies the source of the file to be downloaded, can be embedded with
                        nestedFields (the format of the nested field must be `<attachment field name>.fileURL`)
                    type: string
                    writeOnly: true
                folder:
                    $ref: "#/components/schemas/Folder"
                id:
                    format: int64
                    type: integer
                link:
                    $ref: "#/components/schemas/Link"
                    readOnly: true
                name:
                    type: string
                previewURL:
                    # @review
                    description:
                        optional field that specifies the preview URL of the file to be used, can be embedded with
                        nestedFields (the format of the nested field must be `<attachment field name>.previewURL`)
                    readOnly: true
                    type: string
                scope:
                    $ref: "#/components/schemas/Scope"
                thumbnailURL:
                    # @review
                    description:
                        optional field that specifies the thumbnail of the file to be used, can be embedded with
                        nestedFields (the format of the nested field must be `<attachment field name>.thumbnailURL`)
                    readOnly: true
                    type: string
            type: object
        Folder:
            properties:
                externalReferenceCode:
                    type: string
                siteId:
                    format: int64
                    type: integer
        Link:
            properties:
                href:
                    type: string
                label:
                    type: string
            type: object
        ListEntry:
            properties:
                key:
                    type: string
                name:
                    type: string
                name_i18n:
                    additionalProperties:
                        type: string
                    readOnly: true
                    type: object
        ObjectEntry:
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    readOnly: true
                    type: object
                auditEvents:
                    description:
                        Optional field with the audit events associated with this object entry, can be embedded with
                        nestedFields
                    items:
                        $ref: "#/components/schemas/AuditEvent"
                    readOnly: true
                    type: array
                creator:
                    $ref: ../../headless/headless-delivery/headless-delivery-impl/rest-openapi.yaml#Creator
                    readOnly: true
                dateCreated:
                    format: date
                    type: string
                dateModified:
                    format: date
                    type: string
                defaultLanguageId:
                    type: string
                externalReferenceCode:
                    type: string
                friendlyUrlPath:
                    description:
                        A relative URL to the page's rendered content.
                    type: string
                friendlyUrlPath_i18n:
                    additionalProperties:
                        type: string
                    description:
                        The localized relative URLs to the page's rendered content.
                    type: object
                id:
                    format: int64
                    type: integer
                keywords:
                    description:
                        A list of keywords describing the object entry.
                    items:
                        type: string
                    type: array
                objectEntryFolderExternalReferenceCode:
                    type: string
                objectEntryFolderId:
                    format: int64
                    type: integer
                permissions:
                    items:
                        type: permission
                    type: array
                properties:
                    additionalProperties:
                        type: object
                    type: object
                    x-json-map: true
                scopeKey:
                    readOnly: true
                    type: string
                status:
                    $ref: "#/components/schemas/Status"
                systemProperties:
                    $ref: "#/components/schemas/SystemProperties"
                    readOnly: true
                taxonomyCategoryBriefs:
                    description:
                        The categories associated with this object entry.
                    items:
                        $ref: "#/components/schemas/TaxonomyCategoryBrief"
                    readOnly: true
                    type: array
                taxonomyCategoryIds:
                    # @review
                    description:
                        A write-only field that adds `TaxonomyCategory` instances to the object entry.
                    items:
                        format: int64
                        type: integer
                    type: array
                    writeOnly: true
            type: object
        Scope:
            properties:
                externalReferenceCode:
                    type: string
                type:
                    enum: [AssetLibrary, Site]
                    type: string
            type: object
        Status:
            properties:
                code:
                    format: int32
                    type: integer
                label:
                    type: string
                label_i18n:
                    type: string
            required:
                -   code
            type: object
        SystemProperties:
            properties:
                version:
                    $ref: "#/components/schemas/Version"
            type: object
        TaxonomyCategoryBrief:
            properties:
                embeddedTaxonomyCategory:
                    # @review
                    description:
                        Optional field with the embedded taxonomy category, can be embedded with nestedFields
                    readOnly: true
                    type: object
                parentTaxonomyCategory:
                    description:
                        The category's parent category.
                    properties:
                        externalReferenceCode:
                            # @review
                            description:
                                The parent taxonomy category's external reference code.
                            type: string
                    type: object
                    writeOnly: true
                parentTaxonomyVocabulary:
                    description:
                        The parent category's `TaxonomyVocabulary`.
                    properties:
                        externalReferenceCode:
                            # @review
                            description:
                                The parent category's `TaxonomyVocabulary` external reference code.
                            type: string
                    type: object
                    writeOnly: true
                scope:
                    $ref: "#/components/schemas/Scope"
                taxonomyCategoryExternalReferenceCode:
                    # @review
                    description:
                        The category's external reference code.
                    type:
                        string
                taxonomyCategoryId:
                    description:
                        The category's ID. This can be used to retrieve more information in the `TaxonomyCategory` API.
                    format: int64
                    readOnly: true
                    type: integer
                taxonomyCategoryName:
                    description:
                        The category's name.
                    readOnly: true
                    type: string
                taxonomyCategoryName_i18n:
                    additionalProperties:
                        type: string
                    # @review
                    description:
                        The localized category's names.
                    readOnly: true
                    type: object
            type: object
        ValidationError:
            properties:
                errorMessage:
                    type: string
                objectFieldName:
                    type: string
                objectValidationRuleExternalReferenceCode:
                    type: string
        ValidationRequest:
            properties:
                objectValidationRuleExternalReferenceCodes:
                    items:
                        type: string
                    type: array
                values:
                    $ref: "#/components/schemas/ObjectEntry"
        ValidationResponse:
            properties:
                validationErrors:
                    items:
                        $ref: "#/components/schemas/ValidationError"
                    type: array
        Version:
            properties:
                number:
                    format: int32
                    readOnly: true
                    type: integer
            type: object
