##
## Test Suites
##

    modified.files.includes[relevant][portal-security-rule]=**

    relevant.rule.names=\
        portal-security-rule

    test.batch.names[relevant][portal-security-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-security-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][portal-security-rule]=\
        apps/portal-security/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][portal-security-rule]=\
        apps/portal-security/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-security-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.main.component.name ~ "AntiSamy") OR \
            (testray.main.component.name ~ "Content Security Policy") OR \
            (testray.main.component.name ~ "LDAP") OR \
            (testray.main.component.name ~ "Login") OR \
            (testray.main.component.name ~ "Permissions") OR \
            (testray.main.component.name ~ "Security") OR \
            (testray.main.component.name ~ "XSS")\
        )

##
## Testray
##

    testray.main.component.name=Security