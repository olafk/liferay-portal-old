##
## Test Suites
##

    modified.files.includes[relevant][site-rule]=**

    relevant.rule.names=\
        site-rule

    test.batch.names[relevant][site-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        functional-upgrade-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][site-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][site-rule]=\
        apps/site/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][site-rule]=\
        apps/site/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][site-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.main.component.name ~ "Localization") OR \
            (testray.main.component.name ~ "Page Administration") OR \
            (testray.main.component.name ~ "Site Settings") OR \
            (testray.main.component.name ~ "Sites Administration")\
        )

    test.batch.run.property.query[functional-upgrade*-tomcat*-mysql*-jdk8][relevant][site-rule]=\
        (portal.acceptance == true)

##
## Testray
##

    testray.main.component.name=Sites Administration