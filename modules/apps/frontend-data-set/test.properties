##
## Playwright
##

    playwright.test.project[playwright-js-tomcat90-mysql57-jdk8][relevant][frontend-data-set-rule]=\
        frontend-data-set-admin-web,\
        frontend-data-set-web

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][frontend-data-set-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][frontend-data-set-rule]=\
        apps/frontend-data-set/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][frontend-data-set-rule]=\
        apps/frontend-data-set/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][frontend-data-set-rule]=\
        (\
            (environment.acceptance == true) OR \
            (testray.component.names ~ "Frontend Data Set")\
        ) AND \
        (\
            (portal.acceptance == true) AND \
            (portal.upstream == true)\
        ) AND \
        (\
            (app.server.types == null) OR \
            (app.server.types ~ "tomcat")\
        ) AND \
        (\
            (database.types == null) OR \
            (database.types ~ "mysql")\
        ) AND \
        (\
            (operating.system.types == null) OR \
            (operating.system.types ~ "centos")\
        )

##
## Test Suites
##

    modified.files.includes[relevant][frontend-data-set-rule]=**

    relevant.rule.names=\
        frontend-data-set-rule

    test.batch.names[relevant][frontend-data-set-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8,\
        playwright-js-tomcat90-mysql57-jdk8

##
## Testray
##

    testray.main.component.name=Frontend Data Set