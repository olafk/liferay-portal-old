##
## Test Suites
##

    modified.files.includes[relevant][changeset-rule]=**

    relevant.rule.names=\
        changeset-rule

    test.batch.names[relevant][changeset-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        functional-upgrade-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    modules.includes.required.test.batch.class.names.includes[modules-integration-*-jdk8][relevant][changeset-rule]=\
        **/asset-test/**/AssetSearcherStagingTest.java,\
        **/src/testIntegration/**/calendar/**/*Test.java,\
        **/src/testIntegration/**/staging/**/*Test.java,\
        apps/changeset/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][changeset-rule]=\
        apps/changeset/**/*Test.java

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][changeset-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][changeset-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.main.component.name ~ "Export/Import") OR \
            (testray.main.component.name ~ "Site Templates") OR \
            (testray.main.component.name ~ "Staging")\
        )

    test.batch.run.property.query[functional-upgrade*-tomcat*-mysql*-jdk8][relevant][changeset-rule]=\
        (portal.acceptance == true) AND \
        (testray.main.component.name ~ "Upgrades Staging")

##
## Testray
##

    testray.main.component.name=Staging