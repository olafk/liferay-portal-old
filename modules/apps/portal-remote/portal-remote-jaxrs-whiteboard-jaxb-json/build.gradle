dependencies {
	compileOnly group: "com.fasterxml.jackson.core", name: "jackson-annotations", version: "2.18.2"
	compileOnly group: "com.fasterxml.jackson.core", name: "jackson-core", version: "2.18.2"
	compileOnly group: "com.fasterxml.jackson.core", name: "jackson-databind", version: "2.18.2"
	compileOnly group: "com.fasterxml.jackson.jaxrs", name: "jackson-jaxrs-base", version: "2.18.2"
	compileOnly group: "com.fasterxml.jackson.jaxrs", name: "jackson-jaxrs-json-provider", version: "2.18.2"
	compileOnly group: "com.fasterxml.jackson.module", name: "jackson-module-jaxb-annotations", version: "2.18.2"
	compileOnly group: "com.liferay", name: "jakarta.ws.rs", version: "2.1.6.LIFERAY-PATCHED-2"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.4.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.jaxrs", version: "1.0.0"
	compileOnly group: "org.osgi", name: "osgi.core", version: "6.0.0"
}

deployDependencies {
	from (configurations.compileOnly) {
		include "jackson-jaxrs-base-*.jar"
		include "jackson-jaxrs-json-provider-*.jar"
		include "jackson-module-jaxb-annotations-*.jar"
	}
}