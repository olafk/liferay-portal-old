##
## Test Suites
##

    modified.files.includes[relevant][address-rule]=**

    relevant.rule.names=\
        address-rule

    test.batch.names[relevant][address-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][address-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][address-rule]=\
        apps/address/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][address-rule]=\
        apps/address/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][address-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Address") OR \
            (testray.main.component.name ~ "Address")\
        )

##
## Testray
##

    testray.main.component.name=Address