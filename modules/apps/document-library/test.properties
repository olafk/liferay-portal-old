##
## Modules
##

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][document-library-rule]=\
        apps/document-library/**/*Test.java,\
        apps/headless/headless-delivery/headless-delivery-test/**/BaseDocument*Test.java,\
        apps/headless/headless-delivery/headless-delivery-test/**/Document*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][document-library-rule]=\
        apps/document-library/**/*Test.java,\
        apps/headless/headless-delivery/headless-delivery-test/**/BaseDocument*Test.java,\
        apps/headless/headless-delivery/headless-delivery-test/**/Document*Test.java

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][document-library-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][document-library-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Document Management") OR \
            (testray.main.component.name ~ "Document Management")\
        )

    test.batch.run.property.query[functional-upgrade*-tomcat*-mysql*-jdk8][relevant][document-library-rule]=\
        (portal.acceptance == true) AND \
        (testray.component.names ~ "Document Management") AND \
        (testray.main.component.name ~ "Upgrades Collaboration")

##
## Test Suites
##

    modified.files.includes[relevant][document-library-rule]=**

    relevant.rule.names=\
        document-library-rule

    test.batch.names[relevant][document-library-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        functional-upgrade-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

##
## Testray
##

    testray.main.component.name=Document Management