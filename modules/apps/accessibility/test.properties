##
## Test Suites
##

    modified.files.includes[relevant][accessibility-rule]=**

    relevant.rule.names=\
        accessibility-rule

    test.batch.names[relevant][accessibility-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][accessibility-rule]=\
        apps/accessibility/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][accessibility-rule]=\
        apps/accessibility/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][accessibility-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Accessibility Menu") OR \
            (testray.main.component.name ~ "Accessibility Menu")\
        )

