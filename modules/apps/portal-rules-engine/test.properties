##
## Test Suites
##

    modified.files.includes[relevant][portal-rules-engine-rule]=**

    relevant.rule.names=\
        portal-rules-engine-rule

    test.batch.names[relevant][portal-rules-engine-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        functional-upgrade-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-rules-engine-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][portal-rules-engine-rule]=\
        apps/portal-rules-engine/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][portal-rules-engine-rule]=\
        apps/portal-rules-engine/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-rules-engine-rule]=\
        (portal.acceptance == true) AND \
        (testray.main.component.name == "Rules")

    test.batch.run.property.query[functional-upgrade-tomcat*-mysql*-jdk8][relevant][portal-rules-engine-rule]=\
        (testray.main.component.name == "Upgrades Rules")

##
## Testray
##

    testray.main.component.name=Rules