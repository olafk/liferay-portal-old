##
## Modules
##

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][portal-store-rule]=\
        apps/change-tracking/**/change-tracking-store-test/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][portal-store-rule]=\
        apps/change-tracking/**/change-tracking-store-test/**/*Test.java

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-store-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[relevant][portal-store-rule]=\
        apps/portal-store/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-store-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Document Management") OR \
            (testray.main.component.name ~ "Document Library Stores") OR \
            (testray.main.component.name ~ "Document Management")\
        )

    test.batch.run.property.query[functional-upgrade*-tomcat*-mysql*-jdk8][relevant][portal-store-rule]=\
        (portal.acceptance == true) AND \
        (testray.component.names ~ "Document Management") AND \
        (testray.main.component.name ~ "Upgrades Collaboration")

##
## Test Suites
##

    modified.files.includes[relevant][portal-store-rule]=**

    relevant.rule.names=\
        portal-store-rule

    test.batch.names[relevant][portal-store-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        functional-upgrade-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

##
## Testray
##

    testray.main.component.name=Document Library Stores