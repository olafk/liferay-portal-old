buildService {
	apiDir = "../asset-display-page-api/src/main/java"
	testDir = "../asset-display-page-test/src/testIntegration/java"
}

dependencies {
	compileOnly group: "com.liferay.jakarta.portlet", name: "com.liferay.jakarta.portlet-api", version: "4.0.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	compileOnly group: "jakarta.servlet", name: "jakarta.servlet-api", version: "6.0.0"
	compileOnly group: "org.osgi", name: "org.osgi.annotation.versioning", version: "1.1.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.4.0"
	compileOnly group: "org.osgi", name: "osgi.core", version: "6.0.0"
	compileOnly project(":apps:asset:asset-display-page-api")
	compileOnly project(":apps:change-tracking:change-tracking-spi")
	compileOnly project(":apps:export-import:export-import-api")
	compileOnly project(":apps:info:info-api")
	compileOnly project(":apps:layout:layout-api")
	compileOnly project(":apps:layout:layout-display-page-api")
	compileOnly project(":apps:layout:layout-page-template-api")
	compileOnly project(":apps:portal:portal-aop-api")
	compileOnly project(":apps:staging:staging-api")
	compileOnly project(":apps:static:portal:portal-upgrade-api")
	compileOnly project(":apps:xstream:xstream-configurator-api")
	compileOnly project(":core:osgi-service-tracker-collections")
	compileOnly project(":core:petra:petra-function")
	compileOnly project(":core:petra:petra-lang")
	compileOnly project(":core:petra:petra-sql-dsl-api")
	compileOnly project(":core:petra:petra-string")
	testImplementation project(":apps:friendly-url:friendly-url-api")
	testImplementation project(":apps:layout:layout-seo-api")
}