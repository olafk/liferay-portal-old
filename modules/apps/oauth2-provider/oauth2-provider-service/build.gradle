	compileOnly project(":apps:portal:portal-dao-orm-custom-sql-api")
	compileOnly project(":apps:static:osgi:osgi-util")
	compileOnly project(":apps:static:portal-configuration:portal-configuration-metatype-api")
	compileOnly project(":apps:static:portal-k8s-agent:portal-k8s-agent-api")
	compileOnly project(":apps:static:portal:portal-upgrade-api")
	compileOnly project(":core:petra:petra-function")
	compileOnly project(":core:petra:petra-lang")
	compileOnly project(":core:petra:petra-sql-dsl-api")
	compileOnly project(":core:petra:petra-string")
	testImplementation group: "junit", name: "junit", version: "4.13.1"
	testImplementation group: "org.apache.commons", name: "commons-compress", version: "1.26.0"
	testImplementation project(":apps:static:portal-configuration:portal-configuration-persistence-api")
}