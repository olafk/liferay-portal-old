buildService {
	apiDir = "../oauth2-provider-api/src/main/java"
}

dependencies {
	compileOnly group: "com.liferay", name: "jakarta.ws.rs", version: "3.1.0.LIFERAY-PATCHED-1"
	compileOnly group: "com.liferay", name: "org.apache.cxf.rt.rs.security.oauth2", version: "3.5.11.JAKARTA-LIFERAY-PATCHED-1"
	compileOnly group: "com.liferay.jakarta.portlet", name: "com.liferay.jakarta.portlet-api", version: "4.0.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "default"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	compileOnly group: "jakarta.servlet", name: "jakarta.servlet-api", version: "6.0.0"
	compileOnly group: "org.osgi", name: "org.osgi.annotation.versioning", version: "1.1.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component", version: "1.4.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.4.0"
	compileOnly group: "org.osgi", name: "osgi.core", version: "6.0.0"
	compileOnly project(":apps:oauth2-provider:oauth2-provider-api")
	compileOnly project(":apps:oauth2-provider:oauth2-provider-scope-liferay-api")
	compileOnly project(":apps:oauth2-provider:oauth2-provider-scope-spi")
	compileOnly project(":apps:portal-remote:portal-remote-jaxrs-whiteboard")
