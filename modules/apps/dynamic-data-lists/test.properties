##
## Modules
##

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][dynamic-data-lists-rule]=\
        apps/dynamic-data-lists/**/*Test.java,\
        apps/dynamic-data-mapping/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][dynamic-data-lists-rule]=\
        apps/dynamic-data-lists/**/*Test.java,\
        apps/dynamic-data-mapping/**/*Test.java

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][dynamic-data-lists-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][dynamic-data-lists-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Dynamic Data Lists") OR \
            (testray.component.names ~ "Forms") OR \
            (testray.component.names ~ "Site Templates") OR \
            (testray.main.component.name == "Forms") OR \
            (testray.main.component.name ~ "Content Management Headless") OR \
            (testray.main.component.name ~ "Dynamic Data Lists")\
        )

##
## Test Suites
##

    modified.files.includes[relevant][dynamic-data-lists-rule]=**

    relevant.rule.names=\
        dynamic-data-lists-rule

    test.batch.names[relevant][dynamic-data-lists-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

##
## Testray
##

    testray.main.component.name=Dynamic Data Lists