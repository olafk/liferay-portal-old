[#assign type=configuration.type!'submit']

[#if configuration.type == "previous"]
	<div class="component-button text-break">
		<button class="btn btn-${configuration.buttonSize} btn-${configuration.buttonType}" [#if input.attributes.disabled?? && input.attributes.disabled]disabled[/#if] id="fragment-${fragmentEntryLinkNamespace}-form-button" type="button">
			<span data-lfr-editable-id="previous-button-text" data-lfr-editable-type="text">
				Previous
			</span>
		</button>
	</div>
[#elseif configuration.type == "next"]
	<div class="component-button text-break">
		<button class="btn btn-${configuration.buttonSize} btn-${configuration.buttonType}" [#if input.attributes.disabled?? && input.attributes.disabled]disabled[/#if] id="fragment-${fragmentEntryLinkNamespace}-form-button" type="button">
			<span data-lfr-editable-id="next-button-text" data-lfr-editable-type="text">
				Next
			</span>
		</button>
	</div>
[#else]
	<div class="component-button text-break">
		<button class="btn btn-${configuration.buttonSize} btn-${configuration.buttonType}" data-lfr-editable-id="submit-button-text" data-lfr-editable-type="text" [#if input.attributes.disabled?? && input.attributes.disabled]disabled[/#if] id="fragment-${fragmentEntryLinkNamespace}-submit-button" name="status" type="submit" value="${configuration.submittedEntryStatus}">
			Submit
		</button>
	</div>
[/#if]
