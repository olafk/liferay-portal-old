##
## Test Suites
##

    modified.files.includes[relevant][fragment-rule]=**

    relevant.rule.names=\
        fragment-rule

    test.batch.names[relevant][fragment-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        functional-upgrade-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][fragment-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][fragment-rule]=\
        apps/fragment/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][fragment-rule]=\
        apps/fragment/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][fragment-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.main.component.name ~ "Content Page Templates") OR \
            (testray.main.component.name ~ "Content Pages") OR \
            (testray.main.component.name ~ "Display Page Templates") OR \
            (testray.main.component.name ~ "Fragment Administration") OR \
            (testray.main.component.name ~ "Master Pages") OR \
            (testray.main.component.name ~ "Page Templates")\
        )

    test.batch.run.property.query[functional-upgrade*-tomcat*-mysql*-jdk8][relevant][fragment-rule]=\
        (portal.acceptance == true)

##
## Testray
##

    testray.main.component.name=Fragment Administration