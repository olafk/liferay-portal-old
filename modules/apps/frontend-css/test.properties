##
## Test Suites
##

    modified.files.includes[relevant][frontend-css-rule]=**

    relevant.rule.names=\
        frontend-css-rule

    test.batch.names[relevant][frontend-css-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][frontend-css-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][frontend-css-rule]=\
        apps/frontend-css/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][frontend-css-rule]=\
        apps/frontend-css/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][frontend-css-rule]=\
        (environment.acceptance == true) AND \
        (portal.acceptance == true) AND \
        (portal.upstream == true) AND \
        (\
            (app.server.types == null) OR \
            (app.server.types ~ "tomcat")\
        ) AND \
        (\
            (database.types == null) OR \
            (database.types ~ "mysql")\
        ) AND \
        (\
            (operating.system.types == null) OR \
            (operating.system.types ~ "centos")\
        )

