##
## Test Suites
##

    modified.files.includes[relevant][cookie-rule]=**

    relevant.rule.names=\
        cookie-rule

    test.batch.names[relevant][cookie-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][cookie-rule]}

    #
    # Relevant
    #

    ignoreParents[relevant][cookie-rule]=true

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][cookie-rule]=\
        **/cookies/**/src/test/**/*Test.java,\
        **/cookies/**/src/testIntegration/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][cookie-rule]=\
        **/cookies/**/src/test/**/*Test.java,\
        **/cookies/**/src/testIntegration/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][cookie-rule]=\
        (portal.acceptance == true) AND \
        (testray.main.component.name ~ "Cookies") AND \
        (\
            (app.server.types == null) OR \
            (app.server.types ~ "tomcat")\
        ) AND \
        (\
            (database.types == null) OR \
            (database.types ~ "mysql")\
        )

