    modified.files.includes[relevant][content-dashboard-rule]=**

    relevant.rule.names=\
        content-dashboard-rule

    test.batch.names[relevant][content-dashboard-rule]=\
        functional-tomcat90-mysql57,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-*-jdk8][relevant][content-dashboard-rule]=\
        apps/content-dashboard/**/src/testIntegration/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][content-dashboard-rule]=\
        apps/content-dashboard/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*][relevant][content-dashboard-rule]=\
        (portal.acceptance == true) AND \
        (testray.main.component.name ~ "Content Dashboard")

