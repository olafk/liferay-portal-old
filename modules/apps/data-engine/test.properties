    modified.files.includes[relevant][data-engine-rule]=**

    relevant.rule.names=\
        data-engine-rule

    test.batch.names[relevant][data-engine-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        functional-upgrade-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

