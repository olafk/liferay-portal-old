## Modules
##

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][portal-upload-servlet-request-filter-rule]=\
        (apps/headless/headless-delivery/headless-delivery-test/**/BaseDocument*Test.java) AND \
        (apps/headless/headless-delivery/headless-delivery-test/**/Document*Test.java)

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][portal-upload-servlet-request-filter-rule]=\
        (apps/headless/headless-delivery/headless-delivery-test/**/BaseDocument*Test.java) AND \
        (apps/headless/headless-delivery/headless-delivery-test/**/Document*Test.java)

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-upload-servlet-request-filter-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-upload-servlet-request-filter-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Document Management") OR \
            (testray.component.names ~ "Forms") OR \
            (testray.main.component.name ~ "Bundle Blacklist") OR \
            (testray.main.component.name ~ "Document Management") OR \
            (testray.main.component.name ~ "Forms")\
        )

    test.batch.run.property.query[functional-upgrade*-tomcat*-mysql*-jdk8][relevant][portal-upload-servlet-request-filter-rule]=\
        (portal.acceptance == true) AND \
        (testray.component.names ~ "Document Management") AND \
        (testray.main.component.name ~ "Upgrades Collaboration")

