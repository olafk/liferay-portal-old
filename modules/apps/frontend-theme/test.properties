##
## Test Suites
##

    modified.files.includes[relevant][frontend-theme-rule]=**

    relevant.rule.names=\
        frontend-theme-rule

    test.batch.names[relevant][frontend-theme-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][frontend-theme-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][frontend-theme-rule]=\
        apps/frontend-theme/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][frontend-theme-rule]=\
        apps/frontend-theme/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][frontend-theme-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names == "Navigation") OR \
            (testray.component.names == "Theme") OR \
            (testray.component.names == "User Interface")\
        )

##
## Testray
##

    testray.main.component.name=Theme