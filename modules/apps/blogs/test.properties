    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][blogs-rule]=\
        apps/blogs/**/*Test.java.\
        apps/headless/headless-delivery/headless-delivery-test/**/BaseBlog*Test.java\
        apps/headless/headless-delivery/headless-delivery-test/**/Blog*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][blogs-rule]=\
        apps/blogs/**/*Test.java.\
        apps/headless/headless-delivery/headless-delivery-test/**/BaseBlog*Test.java\
        apps/headless/headless-delivery/headless-delivery-test/**/Blog*Test.java

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][blogs-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][blogs-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Blogs") OR \
            (testray.main.component.name ~ "Blogs")\
        )

