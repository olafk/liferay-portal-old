##
## Test Suites
##

    modified.files.includes[relevant][product-navigation-rule]=**

    relevant.rule.names=\
        product-navigation-rule

    test.batch.names[relevant][product-navigation-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][product-navigation-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][product-navigation-rule]=\
        apps/product-navigation/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][product-navigation-rule]=\
        apps/product-navigation/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][product-navigation-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Simulation") OR \
            (testray.main.component.name ~ "Control Menu") OR \
            (testray.main.component.name ~ "Page Administration") OR \
            (testray.main.component.name ~ "Pages Tree") OR \
            (testray.main.component.name ~ "Sites Administration")\
        )

