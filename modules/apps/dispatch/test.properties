##
## Test Suites
##

    modified.files.includes[relevant][dispatch-rule]=**

    relevant.rule.names=\
        dispatch-rule

    test.batch.names[relevant][dispatch-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][dispatch-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][dispatch-rule]=\
        apps/dispatch/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][dispatch-rule]=\
        apps/dispatch/**/*Test.java

    test.batch.class.names.includes[relevant][dispatch-rule]=\
        **/dispatch/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][dispatch-rule]=\
        (portal.acceptance == true) AND \
        (testray.main.component.name == "Job Scheduler")

##
## Testray
##

    testray.main.component.name=Job Scheduler