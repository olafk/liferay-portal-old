                - id
            type: object
        Currency:
            properties:
                active:
                    example: true
                    type: boolean
                code:
                    example: USD
                    type: string
                formatPattern:
                    additionalProperties:
                        type: string
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    type: object
                id:
                    example: 30130
                    format: int64
                    minimum: 0
