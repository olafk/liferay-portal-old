                    type: string
                productId:
                    example: 33131
                    format: int64
                    minimum: 0
                    readOnly: true
                    type: integer
                radius:
                    example: 33.54
                    format: double
                    type: number
                type:
                    example: default
                    type: string
            type: object
        Error:
            properties:
                errorCode:
                    description:
                        Internal error code mapping
                    example: 996
                    readOnly: true
                    type: integer
                errorDescription:
                    example: Unable to find currency. Currency code should be expressed with
