components:
    parameters:
        catalogIdQueryParam:
            in: query
            explode: true
            name: catalogId
            required: false
            schema:
                type: integer
            style: form
        externalReferenceCodePathParam:
            in: path
            explode: false
            name: externalReferenceCode
            required: true
            schema:
                description:
                    The resource external reference code
                example: AB-34098-789-N
                minLength: 1
                type: string
            style: simple
        groupedProductIdPathParam:
            in: path
            explode: false
            name: groupedProductId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        idPathParam:
            in: path
            explode: false
            name: id
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        mappedProductIdPathParam:
            in: path
            explode: false
            name: mappedProductId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        pageQueryParam:
            in: query
            explode: true
            name: page
            required: false
            schema:
                type: integer
            style: form
        pageSizeQueryParam:
            in: query
            explode: true
            name: pageSize
            required: false
            schema:
                type: integer
            style: form
        pinIdPathParam:
            in: path
            explode: false
            name: pinId
            required: true
            schema:
                description:
                    The resource Id
                example: 30130
                format: int64
                minimum: 0
                type: integer
            style: simple
        searchQueryParam:
            in: query
            explode: true
            name: search
            required: false
            schema:
                type: string
            style: form
        sequencePathParam:
            in: path
            explode: false
            name: sequence
            required: true
            schema:
                description:
                    The sequence of the pin
                example: 12c
                minLength: 1
                type: string
            style: simple
    responses:
        NotFound:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                The specified resource was not found
        UnauthorizedError:
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                application/xml:
                    schema:
                        $ref: "#/components/schemas/Error"
            description:
                Authentication information is missing or invalid
    schemas:
        Attachment:
            properties:
                attachment:
                    description:
                        Base64 encoded file
                    type: string
                cdnEnabled:
                    type: boolean
                cdnURL:
                    example: AB-34098-789-N
                    type: string
                contentType:
                    description:
                        Content type of attachment
                    type: string
                customFields:
                    items:
                        $ref: "#/components/schemas/CustomField"
                    type: array
                displayDate:
                    example: 2017-07-21
                    format: date
                    type: string
                expirationDate:
                    example: 2017-08-21
                    format: date
                    type: string
                externalReferenceCode:
                    example: AB-34098-789-N
                    type: string
                fileEntryExternalReferenceCode:
                    example: AB-34098-789-N
                    type: string
                fileEntryGroupExternalReferenceCode:
                    example: AB-34098-789-N
                    type: string
                fileEntryId:
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                galleryEnabled:
                    type: boolean
                id:
                    example: 30130
                    format: int64
                    minimum: 0
                    type: integer
                neverExpire:
                    example: true
                    type: boolean
                options:
                    additionalProperties:
                        type: string
                    example:
                        color: yellow
                        optionKey: optionValueKey
                        size: xs
                    type: object
                priority:
                    example: 1.2
                    format: double
                    type: number
                src:
                    description:
                        URL of the location
                    type: string
                tags:
                    example:
                        - tag1
                        - tag2
                        - tag3
                    items:
                        type: string
                    type: array
                title:
                    additionalProperties:
                        type: string
                    example:
                        en_US: Hand Saw
                        hr_HR: Attachment Title HR
                        hu_HU: Attachment Title HU
                    type: object
                type:
                    format: int32
                    readOnly: true
                    type: integer
            type: object
        AttachmentBase64:
            properties:
                attachment:
                    description:
                        Base64 encoded file
                    type: string
                contentType:
                    description:
