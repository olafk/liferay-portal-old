                status:
                    description:
                        HTTP Status code
                    example: 404
                    readOnly: true
                    type: integer
            required:
                - errorCode
                - errorDescription
                - message
                - status
            type: object
        Geo:
            description:
                A point determined by latitude and longitude.
            properties:
                latitude:
                    description:
                        The latitude of a point in space.
                    format: double
                    type: number
                longitude:
                    description:
