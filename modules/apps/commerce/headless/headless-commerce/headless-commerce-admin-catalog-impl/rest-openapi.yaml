                name:
                    additionalProperties:
                        type: string
                    example:
                        en_US: Hand Saw
                        hr_HR: Product Name HR
                        hu_HU: Product Name HU
                    type: object
                primary:
                    example: true
                    type: boolean
                priority:
                    example: 1.2
                    format: double
                    type: number
                rate:
                    example: 33.54
                    format: bigdecimal
                    type: number
                roundingMode:
                    enum: [UP, DOWN, CEILING, FLOOR, HALF_UP, HALF_DOWN, HALF_EVEN, UNNECESSARY]
                    example: HALF_EVEN
                    type: string
                symbol:
                    example: $
                    type: string
            required:
                - code
                - name
            type: object
        CustomField:
            # @review
            description:
                Represents the value of each custom field. Fields can contain different information types (e.g.,
                geolocation, strings, etc.).
            properties:
                customValue:
                    $ref: "#/components/schemas/CustomValue"
                dataType:
                    description:
                        The field type (e.g., image, text, etc.).
                    readOnly: true
                    type: string
                name:
                    description:
                        The field's internal name. This is valid for comparisons and unique in the structured content.
                    type: string
        CustomValue:
            properties:
                data:
                    description:
                        The field's content for simple types.
                    type: object
                data_i18n:
                    additionalProperties:
                        type: string
                    type: object
                geo:
                    $ref: "#/components/schemas/Geo"
                    description:
                        A point determined by latitude and longitude.
            type: object
        Diagram:
            properties:
                attachmentBase64:
                    $ref: "#/components/schemas/AttachmentBase64"
                color:
                    example: black
