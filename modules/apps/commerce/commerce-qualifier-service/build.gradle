buildService {
	apiDir = "../commerce-qualifier-api/src/main/java"
	testDir = "../commerce-qualifier-test/src/testIntegration/java"
}

dependencies {
	compileOnly group: "com.liferay.jakarta.portlet", name: "com.liferay.jakarta.portlet-api", version: "4.0.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	compileOnly group: "jakarta.servlet", name: "jakarta.servlet-api", version: "6.0.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.4.0"
	compileOnly group: "org.osgi", name: "osgi.core", version: "6.0.0"
	compileOnly project(":apps:account:account-api")
	compileOnly project(":apps:commerce:commerce-api")
	compileOnly project(":apps:commerce:commerce-currency-api")
	compileOnly project(":apps:commerce:commerce-discount-api")
	compileOnly project(":apps:commerce:commerce-inventory-api")
	compileOnly project(":apps:commerce:commerce-order-rule-api")
	compileOnly project(":apps:commerce:commerce-payment-api")
	compileOnly project(":apps:commerce:commerce-price-list-api")
	compileOnly project(":apps:commerce:commerce-qualifier-api")
	compileOnly project(":apps:commerce:commerce-shipping-engine-fixed-api")
	compileOnly project(":apps:commerce:commerce-term-api")
	compileOnly project(":apps:portal-search:portal-search-api")
	compileOnly project(":apps:portal-search:portal-search-spi")
	compileOnly project(":apps:portal:portal-aop-api")
	compileOnly project(":apps:portal:portal-dao-orm-custom-sql-api")
	compileOnly project(":apps:static:portal-configuration:portal-configuration-metatype-api")
	compileOnly project(":apps:static:portal:portal-upgrade-api")
	compileOnly project(":core:osgi-service-tracker-collections")
	compileOnly project(":core:petra:petra-function")
	compileOnly project(":core:petra:petra-lang")
	compileOnly project(":core:petra:petra-sql-dsl-api")
	compileOnly project(":core:petra:petra-string")
}