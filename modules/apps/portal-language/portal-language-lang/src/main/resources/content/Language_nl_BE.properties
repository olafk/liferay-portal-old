when-this-configuration-is-enabled,-search-engines-will-be-notified-that-child-page-urls-are-available-for-crawling=Wanneer deze configuratie is ingeschakeld, krijgen zoekmachines een melding dat er URL's van onderliggende pagina's beschikbaar zijn voor verkenning.
when-this-configuration-is-enabled,-search-engines-will-be-notified-that-page-URLs-are-available-for-crawling=Wanneer deze configuratie is ingeschakeld, krijgen zoekmachines een melding dat pagina-URL's beschikbaar zijn voor verkenning. Deze configuratie is van invloed op widgetpagina's, inhoudpagina's, paneelpagina's, collectiepagina's en ingesloten pagina's.
when-this-configuration-is-enabled,-search-engines-will-be-notified-that-web-content-URLs-are-available-for-crawling=Wanneer deze configuratie is ingeschakeld, krijgen zoekmachines een melding dat webinhoud-URL's beschikbaar zijn voor verkenning.
when-you-disable-inheritance,-the-first-child-object-is-updated-with-options-for-showing-the-widget-in-the-page-builder-and-for-configuring-the-panel-link=Wanneer u overname uitschakelt, wordt het eerste onderliggende object bijgewerkt met opties voor weergave van de widget in de paginabouwer en voor de configuratie van de paneellink. Het wordt tevens het nieuwe bovenliggende object als er meerdere onderliggende objecten zijn. Dit resulteert in:
