when-no-password-policy-is-assigned-to-a-user,-either-explicitly-or-through-an-organization,-the-default-password-policy-is-used=Als er aan gebruikers geen wachtwoordbeleid is toegekend, noch rechtstreeks, noch via een organisatie, zal het standaardwachtwoordbeleid gebruikt worden.
when-this-configuration-is-enabled,-a-sitemap-index-is-created=Wanneer deze configuratie is ingeschakeld, wordt er een sitemapindex gemaakt. Deze voorziet links naar meerdere sitemapbestanden in plaats van één groot bestand met alle url-sets. Dit vereist minder bandbreedte en verbetert de prestaties. Zie {0} voor meer informatie. Schakel deze configuratie uit om het sitemap.xml-bestand te maken op basis van een opmaakset.
