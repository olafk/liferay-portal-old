jakarta.portlet.description.com_liferay_adaptive_media_web_portlet_AMPortlet=Adaptive Media detecteert de mogelijkheden van het apparaat van de bezoeker en levert automatisch de optimale versie van uw opgeslagen media.
jakarta.portlet.description.com_liferay_asset_categories_admin_web_portlet_AssetCategoriesAdminPortlet=Categorieën beschrijven woordenboeken om content (Web Content, documente, afbeeldingen, ...) te taggen. Administrators kunnen woordenboeken creëren en ze opvullen met categorieën die gebruikers kunnen kiezen als ze content toevoegen.
jakarta.portlet.description.com_liferay_asset_tags_admin_web_portlet_AssetTagsAdminPortlet=Labels bieden categorisering van content door flexibel groeperen van termen en voorgedefinieerde woordenboek. Administrators kunnen labels, permissies en geavanceerder opties beheren. Gebruikers beheren hun labels, definiëren label groepen en categorieën tijdens het categoriseren van content.
