when-enabled,-permissions-and-workflow-are-inherited,-all-api-endpoints-are-grouped-under-the-parent,-and-the-relationship-field-is-always-mandatory=Wanneer dit is ingeschakeld, worden machtigingen en de workflow overgenomen, worden alle API-eindpunten gegroepeerd onder het bovenliggende object en is het relatieveld altijd verplicht.
when-enabled,-users-can-override-an-entry's-friendly-url=Indien ingeschakeld, kunnen gebruikers de beschrijvende URL van een item wijzigen. Standaard is de beschrijvende URL gebaseerd op het titelveld van het item.
