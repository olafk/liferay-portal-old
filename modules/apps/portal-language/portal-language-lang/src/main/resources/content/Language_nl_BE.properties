staged-applications-alert=Wanneer een applicatie is aangevinkt, wordt de data gekopieerd naar staging en is het wellicht niet mogelijk om ze direct te bewerken. Bij deselectie van een applicatie, moeten wijzigingen in staging eerst gepubliceerd worden, anders kunnen ze verloren gaan.
staged-applications-help=Geselecteerde applicaties zijn 'Staged'. Dit betekent dat data automatisch worden gepubliceerd wanneer een pagina met deze applicaties is gepubliceerd. De applicaties die zijn uitgeschakeld en geselecteerd, worden altijd automatisch geëxporteerd, zelfs als ze niet op de pagina staan. De applicaties die zijn uitgeschakeld en gedeselecteerd, worden nooit automatisch gepubliceerd. Samenwerkingsapplicaties zoals <em>Blogs, Discussieforums en Wiki</em> worden uitgesloten van Staging omdat hun data standaard afkomstig zijn van Live. Dus wanneer een applicatie NIET Staged is, bevat de Live-omgeving de enige belangrijke data. Wanneer Local Live-staging wordt gebruikt, worden dezelfde data weergegeven van om het eender welke omgeving.
