deleting-a-data-set-view-is-an-action-that-cannot-be-reversed=Het verwijderen van een gegevenssetweergave is een actie die niet kan worden teruggedraaid. De inhoud wordt verwijderd en sommige gegevenssetfragmenten worden mogelijk niet weergegeven.
