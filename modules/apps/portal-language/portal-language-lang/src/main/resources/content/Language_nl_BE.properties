jakarta.portlet.description.com_liferay_document_library_web_portlet_DLAdminPortlet=Documents and Media Library is a full featured virtual shared drive, with file attributes and metadata, versioning, and customizable folders. Administrators can manage folders and documents, change permissions and browse the document library.
jakarta.portlet.description.com_liferay_exportimport_web_portlet_ExportImportPortlet=Exporteren/importeren maakt het mogelijk een gehele site, of een deel van de content van de site, te exporteren of importeren.
jakarta.portlet.description.com_liferay_fragment_web_portlet_FragmentPortlet=Fragmentportlet
jakarta.portlet.description.com_liferay_gogo_shell_web_internal_portlet_GogoShellPortlet=De Gogo Shell biedt de mogelijkheid op interactie met de structuur van de Liferay-module.
jakarta.portlet.description.com_liferay_journal_web_portlet_JournalPortlet=Web Content kan elke content zijn die u wilt toevoegen aan een site, zoals artikelen, een FAQ of een nieuwsbericht. Beheerders kunnen de content beheren en er gebruikersrollen en machtigingen aan toevoegen. Gebruikers kunnen toevoegen, bewerken, goedkeuren, of content bekijken, afhankelijk van hun rol.
jakarta.portlet.description.com_liferay_knowledge_base_web_portlet_AdminPortlet=Met de kennisbank kunt u kennis verzamelen, organiseren en inzichtelijk maken. Een beheerder kan gebruikers toegang geven tot sjablonen om kennisbankartikelen te maken.
jakarta.portlet.description.com_liferay_layout_admin_web_portlet_GroupPagesPortlet=Pagina's zijn webpagina's die gecreërd zijn in het portaal. Afhankelijk van jouw rol, kan je deze pagina's bewerken, de "Look and feel" wijzigen of zelfs pagina's toevoegen.
jakarta.portlet.description.com_liferay_layout_portlets_web_portlet_LayoutPortletsPortlet=Widgets zijn kleine applicaties die aan een pagina kunnen worden toegevoegd.
jakarta.portlet.description.com_liferay_layout_set_prototype_web_portlet_LayoutSetPrototypePortlet=Sitesjablonen bieden u de mogelijkheid om pagina's en webinhoud te omschrijven voor gebruik bij het maken van sites. U kunt sitesjablonen en de bijbehorende machtigingen omschrijven en bewerken.
jakarta.portlet.description.com_liferay_message_boards_web_portlet_MBAdminPortlet=Een Forum is een conversatieplatform voor gebruikers dat bestaat uit meerdere niveaus. Een beheerder kan forums beheren, gebruikersrollen en rechten toewijzen en gebruikers uitsluiten. Een gebruiker kan conversaties en categorieën volgen per e-mail, en statistieken bekijken.
jakarta.portlet.description.com_liferay_monitoring_web_portlet_MonitoringPortlet=Via Monitoring kunt u alle livesessies in het portaal zien. Vanuit performance-overwegingen wordt deze instelling in productie meestal uitgezet.
jakarta.portlet.description.com_liferay_my_account_web_portlet_MyAccountPortlet=Mijn account organiseert al jouw informatie op één makkelijk te gebruiken plaats. Gebruikers kunnen hun profiel, community en organisatielidmaatschap, groepen bepalen of bekijken, en hun instellingen wijzigen.
jakarta.portlet.description.com_liferay_mysubscriptions_web_portlet_MySubscriptionsPortlet='Ik volg' verzamelt alles wat u volgt op één makkelijk te gebruiken plek.
jakarta.portlet.description.com_liferay_oauth2_provider_web_internal_portlet_OAuth2AdminPortlet=Geeft applicaties van derden veilige toegang tot gebruikersbronnen zonder de wachtwoorden te geven.
jakarta.portlet.description.com_liferay_password_policies_admin_web_portlet_PasswordPoliciesAdminPortlet=Wachtwoordbeleidsregels definiëren veiligheidsmaatregelen op bedrijfsniveau, zoals uitsluiting van gebruikers en vervaltermijnen voor wachtwoorden. U kunt beleidsregels definiëren of delegeren aan een LDAP-server.
jakarta.portlet.description.com_liferay_plugins_admin_web_portlet_PluginsAdminPortlet=Met componenten kun je componenttypes zoals portlets, thema's en indelingssjablonen gebruiken of uitschakelen.
jakarta.portlet.description.com_liferay_portal_instances_web_portlet_PortalInstancesPortlet=Virtuele instanties laat u meerdere instanties van Liferay uitvoeren op één enkele server. Omdat instanties dezelfde database delen, zijn hun gebruikers, sites organisaties, rollen, instellingen, etc. onafhankelijk van de instantie.
jakarta.portlet.description.com_liferay_portal_search_admin_web_portlet_SearchAdminPortlet=Zoekinstellingen beheren indexering en andere zoekmachinefuncties.
jakarta.portlet.description.com_liferay_portal_settings_web_portlet_PortalSettingsPortlet=Instantie-instellingen omvatten globale configureerbare instantie-instellingen zoals namen, authenticatie, standaard gebruikerkoppelingen en hostnamen voor e-mail.
jakarta.portlet.description.com_liferay_portal_workflow_instance_tracker_web_internal_portlet_WorkflowInstanceTrackerPortlet=Workflowinstantietracker
jakarta.portlet.description.com_liferay_portal_workflow_web_internal_portlet_SiteAdministrationWorkflowPortlet=Wijst workflowprocessen toe aan assets en houdt toezicht op huidige processen.
jakarta.portlet.description.com_liferay_portal_workflow_web_internal_portlet_UserWorkflowPortlet=Geeft de lijst op van door u gestarte workflowprocessen.
jakarta.portlet.description.com_liferay_roles_admin_web_portlet_RolesAdminPortlet=Roles are groupings of users that share a particular function within the portal, according to a particular scope. You can add roles which can be granted permissions to various functions within portlet applications.
jakarta.portlet.description.com_liferay_saved_content_web_portlet_MySavedContentPortlet='Mijn opgeslagen inhoud' organiseert al uw opgeslagen inhoud op één makkelijk te gebruiken plek.
jakarta.portlet.description.com_liferay_segments_web_internal_portlet_SegmentsPortlet=Een segment vertegenwoordigt een reeks gebruikers die aan bepaalde criteria voldoen. Segmenten kunnen worden gebruikt om aangepaste ervaringen te maken voor hun leden. Beheerders kunnen segmenten toevoegen, bekijken, bijwerken en verwijderen, en voorbeeldweergaven van leden bekijken.
jakarta.portlet.description.com_liferay_server_admin_web_portlet_ServerAdminPortlet=Server Administration settings control logs, caching, search indexing, and other advanced features. You can monitor system performance, alter detailed server settings, reindex searches, and modify caching.
jakarta.portlet.description.com_liferay_site_admin_web_portlet_SiteAdminPortlet=Communities zijn een verzameling van gebruikers zonder hiërarchie. Administrators kunnen communities creëren, lidmaatschap beheren, rollen definiëren, en de eigenschappen van een community bepalen.
jakarta.portlet.description.com_liferay_site_teams_web_portlet_SiteTeamsPortlet=Een Team is een groep siteleden. Een sitebeheerder kan specifieke rechten toekennen aan een team, waarbij dezelfde procedure volgt als bij rollen.
jakarta.portlet.description.com_liferay_staging_configuration_web_portlet_StagingConfigurationPortlet=Staging configuratie geeft toegang tot configureerbare staging mogelijkheden van uw site.
jakarta.portlet.description.com_liferay_trash_web_portlet_TrashPortlet=De Prullenbak laat alle content zien die is verwijderd door gebruikers. Deze content kan worden hersteld of voorgoed worden verwijderd.
jakarta.portlet.description.com_liferay_user_groups_admin_web_portlet_UserGroupsAdminPortlet=Gebruikersgroepen bieden de mogelijkheid om gebruikers te groeperen los van de organisaties waarvan ze deel uitmaken. U kunt een gebruikersgroep definiëren en toewijzen als lid van een site om automatisch alle gebruikers in de groep lid te maken.
jakarta.portlet.description.com_liferay_users_admin_web_portlet_UsersAdminPortlet=Gebruikers zijn personen die taken uitvoeren met de portal. U kunt nieuwe gebruikers aanmaken of bestaande gebruikers inactief maken. Gebruikers kunnen deelnemen aan sites, in organisatiehiërarchieën geplaatst worden, machtigingen krijgen in rollen, of gegroepeerd worden in gebruikersgroepen. Gebruikersgroepen kunnen organisatiegrenzen overschrijden en gebruikt worden om alle leden toe te wijzen aan andere collecties, zoals sites of rollen. Gebruikersgroepen kunnen ook gebruikt worden om sitesjablonen op maat te maken voor leden.
jakarta.portlet.description.com_liferay_wiki_web_portlet_WikiAdminPortlet=Wiki is een sociale encyclopedie waarin gebruikers samenkomen en kennis delen over een bepaald onderwerp. Administrators kunnen wikipagina's toevoegen en bewerken, permissies wijzigen en geavanceerde opties instellen.
