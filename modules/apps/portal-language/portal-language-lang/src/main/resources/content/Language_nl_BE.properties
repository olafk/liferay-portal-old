cookies-allowed=Cookies toegestaan
cookies-banner-content=Wij gebruiken cookies om gepersonaliseerde inhoud te leveren, trends te analyseren, de site te beheren, de bewegingen van de gebruiker op de site te volgen, en demografische informatie te verzamelen over ons gebruikersbestand in zijn geheel. Accepteer alle cookies voor de best mogelijke ervaring op onze website of beheer uw voorkeuren.
cookies-banner-title=Deze website gebruikt cookies
cookies-configuration=Cookieconfiguratie
cookies-consent-description=Wanneer u een website bezoekt, kan deze informatie in uw browser opslaan of opvragen, meestal in de vorm van cookies. Deze informatie kan over u, uw voorkeuren of uw apparaat gaan en wordt meestal gebruikt om de site te laten werken zoals u dat verwacht. De informatie identificeert u meestal niet rechtstreeks, maar kan u wel een meer gepersonaliseerde webervaring geven. U kunt kiezen om sommige soorten cookies niet toe te staan. Klik op de verschillende categorietitels om meer te weten te komen en onze standaardinstellingen te wijzigen. Het blokkeren van sommige soorten cookies kan echter invloed hebben op uw ervaring van de site en de diensten die we kunnen aanbieden.
cookies-description[CONSENT_TYPE_FUNCTIONAL]=Deze cookies stellen de website in staat om een verbeterde functionaliteit en personalisatie te bieden. Ze kunnen door ons geplaatst worden of door derde aanbieders wier diensten we aan onze pagina's hebben toegevoegd. Als u deze cookies niet toestaat, is het mogelijk dat sommige of al deze diensten niet naar behoren werken.
cookies-description[CONSENT_TYPE_NECESSARY]=Deze cookies zijn noodzakelijk voor de werking van de website en kunnen in onze systemen niet worden uitgeschakeld. Ze worden gewoonlijk alleen geplaatst als reactie op door u uitgevoerde handelingen voor een verzoek om diensten, zoals het instellen van uw privacyvoorkeuren, inloggen of het invullen van formulieren. U kunt uw browser zo instellen dat deze cookies worden geblokkeerd of dat u er een waarschuwing voor krijgt, maar dan zullen sommige delen van de site niet werken. Deze cookies slaan geen persoonlijk identificeerbare informatie op.
cookies-description[CONSENT_TYPE_PERFORMANCE]=Met deze cookies kunnen we bezoeken en verkeersbronnen tellen, zodat we de prestaties van onze site kunnen meten en verbeteren. Ze helpen ons te weten welke pagina's het meest en het minst populair zijn, en te zien hoe bezoekers op de site bewegen. Alle informatie die deze cookies verzamelen, is geaggregeerd en dus anoniem. Als u deze cookies niet toestaat, zullen we niet weten wanneer u onze site hebt bezocht.
cookies-description[CONSENT_TYPE_PERSONALIZATION]=Deze cookies kunnen via onze site geplaatst worden door onze reclamepartners. Ze kunnen door die bedrijven gebruikt worden om een profiel van uw interesses op te bouwen en u relevante advertenties te tonen op andere sites. Ze slaan geen directe persoonlijke informatie op, maar zijn gebaseerd op de unieke identificatie van uw browser en internetapparaat. Als u deze cookies niet toestaat, zal u minder gerichte reclame te zien krijgen.
