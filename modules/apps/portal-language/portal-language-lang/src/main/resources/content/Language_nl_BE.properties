jakarta.portlet.description.com_liferay_commerce_product_definitions_web_internal_portlet_CPDefinitionsPortlet=Een product is alles wat op een markt kan worden aangeboden. Beheerders kunnen producten toevoegen, bekijken, bijwerken en verwijderen.
jakarta.portlet.description.com_liferay_commerce_product_options_web_internal_portlet_CPOptionCategoriesPortlet=Specificatiegroepen worden gebruikt om specificaties in te delen in categorieën. Beheerders kunnen specificatiegroepen toevoegen, bekijken, bijwerken en verwijderen.
jakarta.portlet.description.com_liferay_commerce_product_options_web_internal_portlet_CPOptionsPortlet=Opties zijn kenmerken van een product die het onderscheiden van andere producten. Opties omvatten de maat, kleur, functie, onderdelen en kenmerken van producten.
