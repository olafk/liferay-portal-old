changing-the-content-type-may-cause-some-elements-of-the-display-page-template-to-lose-their-previous-mapping=Als u het inhoudstype wijzigt, kunnen sommige elementen van de weergavepaginasjabloon hun vorige toewijzing verliezen.
changing-the-currency-restrictions-will-affect-existing-open-orders=Het wijzigen van de valutabeperkingen heeft invloed op bestaande openstaande bestellingen. Controleer deze voordat u de volgende lijst bewerkt.
changing-the-default-language-will-reset-the-article's-history-making-previous-changes-untrackable=Als u de standaardtaal wijzigt, wordt de geschiedenis van het artikel gereset en zullen eerdere wijzigingen niet meer te volgen zijn.
changing-the-display-page-template-will-affect-all-web-content-article-versions-even-when-autosaving=Een wijziging van het weergavepaginasjebloon heeft gevolgen voor alle artikelversies van webinhoud, zelfs bij het automatisch opslaan.
changing-the-document-type-will-cause-data-loss=Als u het documenttype wijzigt, gaan de gegevens verloren en kunt u ze niet meer herstellen. Weet u zeker dat u het documenttype wilt wijzigen?
changing-the-friendly-url-will-affect-all-web-content-article-versions-even-when-autosaving=Een wijziging van de beschrijvende URL heeft gevolgen voor alle artikelversies van webinhoud, zelfs bij het automatisch opslaan.
changing-the-language-does-not-automatically-translate-the-existing-template-script=Door een andere taal te selecteren wordt het bestaande sjabloonscript niet automatisch vertaald. Om het palet te kunnen gebruiken nadat de taal is aangepast dient u eerst op te slaan.
changing-the-order-of-the-categories-is-not-supported=Wijzigingen in de volgorde van de categorieën worden niet ondersteund.
changing-the-structure-key-will-reindex-all-the-web-content-articles-with-this-structure.-this-action-may-take-some-time,-and-the-affected-items-may-not-be-available-during-this-process=Door de structuursleutel te wijzigen, worden alle webinhoudsartikelen met deze structuur opnieuw geïndexeerd. Deze actie kan enige tijd duren, en het is mogelijk dat de betreffende items niet beschikbaar zijn tijdens dit proces.
changing-the-template-will-not-affect-the-original-web-content-default-template.-the-change-only-applies-to-this-web-content-display=Wijziging van de sjabloon <strong>heeft geen invloed op standaardsjabloon van de oorspronkelijke webinhoud</strong>. <strong>De wijziging als alleen van toepassing voor de weergave van deze webinhoud</strong>.
