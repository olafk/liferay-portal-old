jakarta.portlet.description.com_liferay_blogs_web_portlet_BlogsAdminPortlet=Blogs zijn korte nieuwsberichten, artikelen of dagboekaantekeningen die een standaard blog-ervaring bieden. Beheerders kunnen bijdragen toevoegen, bekijken, bijwerken en verwijderen.
jakarta.portlet.description.com_liferay_bookmarks_web_portlet_BookmarksAdminPortlet=Bookmarks zijn snelkoppelingen naar vaak gebruikt of interessante websites die u met andere gebruikers wilt delen. Gebruikers kunnen bookmarks toevoegen, verwijderen en delen.
