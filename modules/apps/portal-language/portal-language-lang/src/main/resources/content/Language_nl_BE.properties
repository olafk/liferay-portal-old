journal-article-search-with-index-description=Deze instelling is verouderd. Stel dit in als 'waar' om artikelen te zoeken via de index. Stel dit in als 'vals' om artikelen te zoeken in de database. Let wel: dit instellen als 'vals' zal het zoeken naar artikelen op basis van Expando-attributen, forumdiscussies of artikelversies uitschakelen.
journal-article-service=Service logboekartikel
