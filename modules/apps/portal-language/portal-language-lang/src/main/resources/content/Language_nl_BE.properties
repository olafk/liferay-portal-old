check-if-a-date-fields-value-is-in-the-future-and-return-a-boolean=Controleer of de waarde van een datumveld in de toekomst ligt en een boolean oplevert. Als het niet zo is, levert de functie het resultaat 'onwaar' op.
check-if-a-date-fields-value-is-in-the-past-and-return-a-boolean=Controleer of de waarde van een datumveld in het verleden ligt en een boolean oplevert. Als het niet zo is, levert de functie het resultaat 'onwaar' op.
check-if-a-date-range-begins-with-a-past-date-and-ends-with-a-future-date=Controleer of de waarde van een datumbereik begint met een datum in het verleden en eindigt met een datum in de toekomst. Als het niet zo is, levert de functie het resultaat 'onwaar' op.
check-if-a-field-contains-a-specific-value-and-return-a-boolean=Controleer of een veld een specifieke waarde bevat en een boolean oplevert. Als het de waarde niet bevat, levert dit het resultaat 'onwaar' op. Deze functie kan worden gebruikt voor numerieke en tekstvelden.
check-if-a-field-contains-a-specific-value-and-return-a-boolean-if-the-field-does-contain-the-value-it-is-invalid=Controleer of een veld een specifieke waarde bevat en een boolean oplevert. Als het de waarde bevat, levert dit het resultaat 'onwaar' op. Deze functie kan worden gebruikt voor numerieke en tekstvelden.
check-if-a-field-has-the-same-date-of-the-value=Controleer of het veld dezelfde datum heeft als de waarde. Als het niet zo is, levert dit het resultaat 'onwaar' op.
check-if-a-field-is-equal-to-a-specific-value-and-return-a-boolean=Controleer of een veld gelijk is aan een specifieke waarde en een boolean oplevert. Als de waarden niet gelijk zijn, levert dit het resultaat 'onwaar' op. Deze functie kan worden gebruikt voor numerieke en tekstvelden.
check-if-a-field-is-not-equal-to-a-specific-value-and-return-a-boolean=Controleer of een veld niet gelijk is aan een specifieke waarde en een boolean oplevert. Als het niet gelijk is, levert dit het resultaat 'onwaar' op. Deze functie kan worden gebruikt voor numerieke en tekstvelden.
check-if-a-numeric-field-is-a-decimal-and-return-a-boolean=Controleer of een numeriek veld een decimaal is en een boolean oplevert. Als het niet zo is, levert de functie het resultaat 'onwaar' op.
check-if-a-numeric-field-is-an-integer-and-return-a-boolean=Controleer of een numeriek veld een geheel getal is en een boolean oplevert. Als het niet zo is, levert de functie het resultaat 'onwaar' op.
check-if-a-numeric-field-is-greater-than-a-specific-numeric-value-and-return-a-boolean=Controleer of een numeriek veld groter is dan een specifieke numerieke waarde en een boolean oplevert. Als het niet zo is, levert de functie het resultaat 'onwaar' op.
check-if-a-numeric-field-is-greater-than-or-equal-to-a-specific-numeric-value-and-return-a-boolean=Controleer of een numeriek veld groter is dan of gelijk is aan een specifieke numerieke waarde en een boolean oplevert. Als het niet zo is, levert de functie het resultaat 'onwaar' op.
check-if-a-numeric-field-is-less-than-a-specific-numeric-value-and-return-a-boolean=Controleer of een numeriek veld kleiner is dan een specifieke numerieke waarde en een boolean oplevert. Als het niet zo is, levert de functie het resultaat 'onwaar' op.
