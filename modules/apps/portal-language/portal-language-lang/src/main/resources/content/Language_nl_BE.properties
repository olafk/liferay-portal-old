detail-illegible-font-sizes=Onleesbare tekengroottes
detail-illegible-font-sizes-description=Veel zoekmachines rangschikken pagina's op basis van hoe geschikt ze zijn voor mobiel gebruik. Tekengroottes kleiner dan 12px zijn vaak moeilijk te lezen op mobiele apparaten en kunnen gebruikers verplichten om in te zoomen om tekst op een comfortabele leesgrootte weer te geven. {0}
detail-illegible-font-sizes-tip=Dit probleem treedt op wanneer 60% of meer van de tekst een tekengrootte van minder dan 12px heeft. Controleer de ingestelde tekengrootte in de editor voor webinhoud, het fragment, de sjabloon of het stijlboek om de regel te vinden die de onleesbare tekst veroorzaakt.
detail-incorrect-image-aspect-ratios=Incorrecte beeldverhoudingen voor afbeeldingen
detail-incorrect-image-aspect-ratios-description=De pagina geeft afbeeldingen weer met een onjuiste beeldverhouding. Als de beeldverhouding van een weergegeven afbeelding aanzienlijk verschilt van de beeldverhouding in het bronbestand, kan de weergegeven afbeelding er vervormd uitzien, wat mogelijk een onaangename gebruikerservaring oplevert. {0}
detail-incorrect-image-aspect-ratios-tip=Onjuiste beeldverhoudingen kunnen worden veroorzaakt door in de sjabloon een vaste hoogte en breedte te gebruiken die niet past bij de verhouding van de originele afbeelding.
detail-invalid-canonical-url=Ongeldige canonieke URL
detail-invalid-canonical-url-description=Wanneer meerdere pagina's vergelijkbare inhoud hebben, beschouwen zoekmachines ze als dubbele versies van dezelfde pagina. Met geldige canonieke links kunt u zoekmachines vertellen welke versie van een pagina ze moeten verkennen en weergeven aan gebruikers in de zoekresultaten. {0}
detail-invalid-canonical-url-failing-element=Als het probleem het feit is dat de canonieke URL niet overeenkomt met de URL van de pagina, probeer dan de configuratie voor het gebruik van gelokaliseerde canonieke URL's te wijzigen via Instantie-instellingen > Pagina's > SEO.
detail-invalid-canonical-url-tip=In een Liferay-site worden canonieke URL's automatisch gegenereerd. Als deze ontbreekt, kan het probleem veroorzaakt worden door het thema. Als het probleem het feit is dat het niet overeenkomt met de URL van de pagina, dan kunt u de configuratie voor het gebruik van gelokaliseerde canonieke URL's wijzigen via Instantie-instellingen > Pagina's > SEO.
detail-invalid-hreflang=Ongeldige Hreflang
detail-invalid-hreflang-description=Veel sites bieden verschillende versies van een pagina op basis van de taal of regio van een gebruiker. Hreflang-links verstrekken zoekmachines de URL's alle versies van een pagina, zodat ze de juiste versie voor elke taal of regio kunnen weergeven. {0}
detail-invalid-hreflang-tip=In een Liferay site worden hreflang-links automatisch gegenereerd. Als deze ontbreken of ongeldig zijn, kan het probleem worden veroorzaakt door het thema of in het Open Graph-extensiepunt.
detail-link-texts=Linktekst
detail-link-texts-description=De linktekst is het klikbare woord of de klikbare zin in een hyperlink. Wanneer linktekst duidelijk het doel van een hyperlink weergeeft, kunnen zowel gebruikers als zoekmachines gemakkelijker begrijpen wat uw inhoud bevat en hoe deze zich verhoudt tot andere pagina's. {0}
detail-link-texts-tip=Maak linkteksten meer beschrijvend door uitdrukkingen zoals "klik hier", "klik hierop" of "Meer info" te vermijden.
detail-low-contrast-ratio=Lage contrastverhouding
detail-low-contrast-ratio-description=De contrastverhouding van achtergrond- en voorgrondkleuren volstaat niet. Een lage contrastverhouding is voor veel gebruikers moeilijk of onmogelijk te lezen. {0}
detail-low-contrast-ratio-tip=Tekst van 18 of 14pt en vetgedrukte tekst heeft een contrastverhouding van 3:1 nodig. Alle andere tekst heeft een contrastverhouding van 4.5:1 nodig. Contrast tussen kleuren kan worden gedefinieerd in het stijlboek, de pagina-/fragmentsjabloon of het fragment zelf.
detail-missing-img-alt-attributes=ALT-attributen afb. ontbreken
detail-missing-img-alt-attributes-description=Voor informatieve elementen moeten worden gestreefd naar korte, beschrijvende alternatieve tekst. {0}
detail-missing-img-alt-attributes-tip=ALT-attributen voor afbeeldingen kunnen zowel in de editors voor webinhoud als voor fragmenten worden toegevoegd.
detail-missing-input-alt-attributes=ALT-attributen invoer ontbreken
detail-missing-input-alt-attributes-description=Wanneer een afbeelding als {0}-knop wordt gebruikt, helpt alternatieve tekst gebruikers van schermlezers en andere ondersteunende technologieën om het doel van de knop te begrijpen. {1}
detail-missing-input-alt-attributes-tip=ALT-attributen voor invoer kunnen worden toegevoegd in de fragmenteditor.
detail-missing-meta-description=Metabeschrijving ontbreekt
detail-missing-meta-description-description=De metabeschrijving geeft een samenvatting van de inhoud van een pagina die zoekmachines opnemen in de zoekresultaten. Een hoogwaardige, unieke metabeschrijving laat uw pagina relevanter lijken en kan uw zoekverkeer verhogen. {0}
detail-missing-meta-description-failing-element=Voeg een beschrijving toe via de configuratiesectie van deze pagina.
detail-missing-meta-description-tip=Een metabeschrijving kan worden toegevoegd in de configuratiesectie van deze pagina.
detail-missing-title-element=Element {0} ontbreekt
detail-missing-title-element-description=Gebruikers van zoekmachines vertrouwen op de titel om te bepalen of een pagina relevant is voor hun zoekopdracht. Het geeft ook gebruikers van schermlezers en andere ondersteunende technologieën een overzicht van de pagina. {0}
detail-missing-title-element-failing-element=Voeg een titel toe via de configuratiesectie van deze pagina.
detail-missing-title-element-tip=Element {0} wordt automatisch gegenereerd uit de assettitel, maar u kunt het wijzigen in de configuratiesectie van deze pagina.
detail-not-all-links-are-crawlable=Niet alle links zijn verkenbaar
detail-not-all-links-are-crawlable-description=Zoekmachines kunnen {0}-attributen op links gebruiken om websites te verkennen. {1}
detail-not-all-links-are-crawlable-tip=Google kan links alleen volgen als ze een {0}-tag zijn met een {1}-attribuut. Zorg ervoor dat de links dit formaat hebben: {2} en linken naar een geschikte bestemming, zodat meer pagina's van de site ontdekt kunnen worden.
detail-page-blocked-from-indexing=Pagina geblokkeerd voor indexering
detail-page-blocked-from-indexing-description=Zoekmachines kunnen uw pagina niet in de zoekresultaten opnemen als ze geen toestemming hebben om de pagina te verkennen. Blokkeer alleen indexering voor inhoud die u niet in zoekresultaten wil laten verschijnen. {0}
detail-page-blocked-from-indexing-failing-element=Wijzig de robots.txt-instelling in de configuratiesectie van deze pagina.
detail-page-blocked-from-indexing-tip=De {0}-specificatie voor robots kan worden gewijzigd in de configuratiesectie van deze pagina.
detail-small-tap-targets=Kleine tikdoelen
detail-small-tap-targets-description=Tikdoelen zijn de gebieden van een webpagina voor interactie met gebruikers op aanraakschermen. Knoppen, links en formulierelementen hebben allemaal tikdoelen. Door ervoor te zorgen dat de tikdoelen groot genoeg zijn en ver genoeg uit elkaar staan, wordt uw pagina beter geschikt voor mobiel gebruik en toegankelijker. {0}
detail-small-tap-targets-tip=Doelen die kleiner zijn dan 48px x 48px of dichter dan 8px uit elkaar staan, slagen niet voor de controle. Zorg er dus voor dat uw lay-out deze regels respecteert.
