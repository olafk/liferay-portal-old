journal-article-export-import-processor-cache-enabled-help=Geeft aan of verwerkte webinhoud in de cache wordt opgeslagen en hergebruikt bij het uitvoeren van een export- of een publicatieproces. Als u dit op true zet, zullen de export- of publicatieprocessen met webinhoud sneller verlopen, maar zal het geheugengebruik toenemen. De cachegrootte en de time-out kunnen voor de cache geconfigureerd worden met de cachenaam "com.liferay.journal.internal.exportimport.content.processor.JournalArticleExportImportProcessorCache".
