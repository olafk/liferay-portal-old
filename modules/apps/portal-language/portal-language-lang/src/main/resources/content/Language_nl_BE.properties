changing-this-setting-will-reset-all-mappings-for-this-collection=Als u deze instelling wijzigt, worden alle toewijzingen voor deze collectie gereset.
changing-your-currency-will-automatically-create-a-new-order-with-the-selected-currency=Als u uw valuta wijzigt, wordt er automatisch een nieuwe bestelling gemaakt met de geselecteerde valuta. Uw huidige bestelling wordt opgeslagen en blijft toegankelijk. Weet u zeker dat u wilt verdergaan?
