##
## Test Suites
##

    modified.files.includes[relevant][export-import-rule]=**

    relevant.rule.names=\
        export-import-rule

    test.batch.names[relevant][export-import-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    modules.includes.required.test.batch.class.names.includes[modules-integration-*-jdk8][relevant][export-import-rule]=\
        **/src/testIntegration/**/exportimport/**/*Test.java,\
        apps/export-import/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][export-import-rule]=\
        **/portal-security-ldap-impl/**/LDAPUserImporterImplTest.java,\
        apps/export-import/**/*Test.java

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][export-import-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][export-import-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.main.component.name ~ "Export/Import") OR \
            (testray.main.component.name ~ "Staging")\
        )

##
## Testray
##

    testray.main.component.name=Export/Import