task buildCreoleLexer(type: Copy)
task buildCreoleParser(type: Copy)

buildCreoleLexer {
	doFirst {
		delete "src/main/java/com/liferay/wiki/engine/creole/internal/parser/parser/Creole10Lexer.java"
	}

	ext {
		autoClean = false
	}

	filter {
		line -> line.replaceAll(/\bthis.type\b/, "this.state.type")
	}

	from "src/main/antlr/com/liferay/wiki/engine/creole/internal/parser/parser/Creole10Lexer.java"
	into "src/main/java/com/liferay/wiki/engine/creole/internal/parser/parser/Creole10Lexer.java"
}

buildCreoleParser {
	doFirst {
		delete "src/main/java/com/liferay/wiki/engine/creole/internal/parser/parser/Creole10Parser.java"
	}

	ext {
		autoClean = false
	}

	filter {
		line -> line.replaceAll(/\b_fsp\b/, "state._fsp")
	}

	filter {
		line -> line.replaceAll(/\bbacktracking\b/, "state.backtracking")
	}

	filter {
		line -> line.replaceAll(/\berrorRecovery\b/, "state.errorRecovery")
	}

	filter {
		line -> line.replaceAll(/\bfailed\b/, "state.failed")
	}

	filter {
		line -> line.replaceAll(/\bruleMemo\b/, "state.ruleMemo")
	}

	from "src/main/antlr/com/liferay/wiki/engine/creole/internal/parser/parser/Creole10Parser.java"
	into "src/main/java/com/liferay/wiki/engine/creole/internal/parser/parser/Creole10Parser.java"
}

configure([compileJava, jarSources]) {
	dependsOn buildCreoleLexer
	dependsOn buildCreoleParser
}

dependencies {
	compileInclude group: "org.antlr", name: "antlr-runtime", version: "3.5.3"
	compileInclude group: "org.antlr", name: "stringtemplate", version: "3.2.1"
	compileOnly group: "com.liferay.jakarta.portlet", name: "com.liferay.jakarta.portlet-api", version: "4.0.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "default"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	compileOnly group: "com.liferay.portal", name: "com.liferay.util.taglib", version: "default"
	compileOnly group: "jakarta.servlet", name: "jakarta.servlet-api", version: "6.0.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.4.0"
	compileOnly project(":apps:frontend-taglib:frontend-taglib-clay")
	compileOnly project(":apps:static:portal-configuration:portal-configuration-metatype-api")
	compileOnly project(":apps:wiki:wiki-api")
	compileOnly project(":core:petra:petra-lang")
	compileOnly project(":core:petra:petra-sql-dsl-api")
	compileOnly project(":core:petra:petra-string")
	testImplementation project(":apps:static:portal-configuration:portal-configuration-persistence-api")
}

liferayOSGi {
	expandCompileInclude = true
}