##
## Playwright
##

    playwright.test.project[playwright-js-tomcat90-mysql57-jdk8][relevant][portal-search-rule]=\
        portal-search-admin-web,\
        portal-search-web

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-search-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][portal-search-rule]=\
        apps/portal-search/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][portal-search-rule]=\
        apps/portal-search/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-search-rule]=\
        (portal.acceptance == true) AND \
        (portal.suite.search.engine ~ "elasticsearch7")

    test.batch.run.property.query[functional-upgrade-tomcat*-mysql*-jdk8][relevant][portal-search-rule]=\
        (portal.suite.search.engine ~ "elasticsearch7") AND \
        (testray.main.component.name ~ "Upgrades Search")

##
## Test Suites
##

    modified.files.includes[relevant][portal-search-rule]=**

    relevant.rule.names=\
        portal-search-rule

    test.batch.names[relevant][portal-search-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        functional-upgrade-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8,\
        playwright-js-tomcat90-mysql57-jdk8

##
## Testray
##

    testray.main.component.name=Web Search