                -   in: query
                    name: languageId
                    schema:
                        type: string
                -   in: query
                    name: rangeEnd
                    schema:
                        type: string
                -   in: query
                    name: rangeKey
                    schema:
                        type: integer
                -   in: query
                    name: rangeStart
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Overview"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Overview"
            tags: ["Overview"]
    "/inventory-analysis":
        get:
            operationId: getInventoryAnalysis
            parameters:
                -   in: query
                    name: categoryId
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: depotEntryId
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: groupBy
                    schema:
