                        type: integer
                -   in: query
                    name: rangeStart
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Overview"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/Overview"
            tags: ["Overview"]
    "/file-overview":
