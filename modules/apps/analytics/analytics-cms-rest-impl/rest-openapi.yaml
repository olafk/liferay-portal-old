                        type: string
                -   in: query
                    name: structureId
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: tagId
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: vocabularyId
                    schema:
                        format: int64
                        type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/InventoryAnalysis"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/InventoryAnalysis"
            tags: ["InventoryAnalysis"]
    "/object-entry-histogram-metric":
        get:
            operationId: getObjectEntryHistogramMetric
            parameters:
