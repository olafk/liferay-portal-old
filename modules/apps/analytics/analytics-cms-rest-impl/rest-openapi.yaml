                        type: integer
                -   in: query
                    name: rangeKey
                    schema:
                        type: integer
                -   in: query
                    name: selectedMetrics
                    schema:
                        items:
                            type: string
                        type: array
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ObjectEntryHistogramMetric"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/ObjectEntryHistogramMetric"
            tags: ["ObjectEntryHistogramMetric"]
    "/object-entry-metric":
        get:
            operationId: getObjectEntryMetric
            parameters:
                -   in: query
                    name: externalReferenceCode
                    required: true
                    schema:
                        type: string
                -   in: query
                    name: groupId
                    schema:
                        format: int64
                        type: integer
                -   in: query
                    name: rangeKey
                    schema:
                        type: integer
                -   in: query
                    name: selectedMetrics
                    schema:
                        items:
                            type: string
                        type: array
            responses:
                200:
                    content:
                        application/json:
                            schema:
