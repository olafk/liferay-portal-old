components:
    schemas:
        ConnectionInfo:
            properties:
                admin:
                    type: boolean
                connectedToAnalyticsCloud:
                    type: boolean
                connectedToSpace:
                    type: boolean
                siteSyncedToAnalyticsCloud:
                    type: boolean
        Histogram:
            properties:
                metricName:
                    type: string
                metrics:
                    items:
                        $ref: "#/components/schemas/Metric"
                    type: array
                total:
                    format: double
                    type: number
                totalValue:
                    format: double
                    type: number
        InventoryAnalysis:
            properties:
                inventoryAnalysisItems:
                    items:
                        $ref: "#/components/schemas/InventoryAnalysisItem"
                    type: array
                totalCount:
                    format: int64
                    type: integer
        InventoryAnalysisItem:
            properties:
                count:
                    format: int64
                    type: integer
                key:
                    type: string
                title:
                    type: string
        Metric:
            properties:
                metricType:
                    type: string
                previousValue:
                    format: double
                    type: number
                previousValueKey:
                    type: string
                trend:
                    $ref: "#/components/schemas/Trend"
                value:
                    format: double
                    type: number
                valueKey:
                    type: string
        ObjectEntryHistogramMetric:
            properties:
                histograms:
                    items:
                        $ref: "#/components/schemas/Histogram"
                    type: array
        ObjectEntryMetric:
            properties:
                dataSourceId:
                    type: string
                defaultMetric:
                    $ref: "#/components/schemas/Metric"
                externalReferenceCode:
                    type: string
                selectedMetrics:
                    items:
                        $ref: "#/components/schemas/Metric"
                    type: array
        Overview:
            properties:
                categoriesCount:
                    format: int64
                    type: integer
                tagsCount:
                    format: int64
                    type: integer
                totalCount:
                    format: int64
                    type: integer
                trend:
                    $ref: "#/components/schemas/Trend"
                vocabulariesCount:
                    format: int64
                    type: integer
        Trend:
            properties:
                classification:
                    enum: [NEGATIVE, NEUTRAL, POSITIVE]
                    type: string
                percentage:
                    format: double
                    type: number
info:
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "/connection-info":
        get:
            operationId: getConnectionInfo
            parameters:
                -   in: query
                    name: depotEntryId
                    required: true
                    schema:
                        format: int64
                        type: integer
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ConnectionInfo"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/ConnectionInfo"
            tags: ["ConnectionInfo"]
    "/content-overview":
