##
## Test Suites
##

    modified.files.includes[relevant][sharing-rule]=**

    relevant.rule.names=\
        sharing-rule

    test.batch.names[relevant][sharing-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][sharing-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][sharing-rule]=\
        apps/sharing/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][sharing-rule]=\
        apps/sharing/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][sharing-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Asset Sharing") OR \
            (testray.main.component.name ~ "Asset Sharing")\
        )

##
## Testray
##

    testray.main.component.name=Asset Sharing