##
## Test Suites
##

    modified.files.includes[relevant][frontend-editor-rule]=**

    relevant.rule.names=\
        frontend-editor-rule

    test.batch.names[relevant][frontend-editor-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][frontend-editor-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][frontend-editor-rule]=\
        apps/frontend-editor/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][frontend-editor-rule]=\
        apps/frontend-editor/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][frontend-editor-rule]=\
        (portal.acceptance == true) AND \
        (testray.component.names ~ "WYSIWYG")

##
## Testray
##

    testray.main.component.name=WYSIWYG