##
## Test Suites
##

    modified.files.includes[relevant][login-rule]=**

    relevant.rule.names=\
        login-rule

    test.batch.names[relevant][login-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][login-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][login-rule]=\
        apps/login/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][login-rule]=\
        apps/login/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][login-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.main.component.name ~ "LDAP") OR \
            (testray.main.component.name ~ "Login") OR \
            (testray.main.component.name ~ "OpenID Connect") OR \
            (testray.main.component.name ~ "Security")\
        )

