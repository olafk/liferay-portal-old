##
## Test Suites
##

    modified.files.includes[relevant][organizations-rule]=**

    relevant.rule.names=\
        organizations-rule

    test.batch.names[relevant][organizations-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        functional-upgrade-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][organizations-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][organizations-rule]=\
        apps/organizations/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][organizations-rule]=\
        apps/organizations/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][organizations-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Users and Organizations") OR \
            (testray.main.component.name ~ "Users and Organizations")\
        )

    test.batch.run.property.query[functional-upgrade*-tomcat*-mysql*-jdk8][relevant][organizations-rule]=\
        (portal.acceptance == true) AND \
        (testray.component.names ~ "Users and Organizations") AND \
        (testray.main.component.name ~ "Upgrades Foundation")

##
## Testray
##

    testray.main.component.name=Users and Organizations