}

deployReqTestLibs {
	ext {
		autoClean = false
	}

	from configurations.reqTestLibs

	into {
		"${liferay.liferayHome}/osgi/test"
	}

	outputs.upToDateWhen {
		false
	}

	rename new RenameDependencyClosure(project, configurations.reqTestLibs.name)
}