##
## Modules
##

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][ai-creator-rule]=\
        apps/ai-creator/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][ai-creator-rule]=\
        apps/ai-creator/**/*Test.java

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][ai-creator-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][ai-creator-rule]=\
        (portal.acceptance == true) AND \
        (testray.main.component.name ~ "AI-Creator")

##
## Test Suites
##

    modified.files.includes[relevant][ai-creator-rule]=**

    relevant.rule.names=\
        ai-creator-rule

    test.batch.names[relevant][ai-creator-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

##
## Testray
##

    testray.main.component.name=AI-Creator