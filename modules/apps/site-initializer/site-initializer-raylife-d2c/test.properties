    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][site-initializer-raylife-d2c-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][site-initializer-raylife-d2c-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Site Initializer Raylife D2C") OR \
            (testray.main.component.name ~ "Site Initializer Raylife D2C")\
        )

##
## Test Suites
##

    modified.files.includes[relevant][site-initializer-raylife-d2c-rule]=**

    relevant.rule.names=\
        site-initializer-raylife-d2c-rule

    test.batch.names[relevant][site-initializer-raylife-d2c-rule]=\
        functional-tomcat90-mysql57-jdk8