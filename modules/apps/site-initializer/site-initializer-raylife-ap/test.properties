    modified.files.includes[relevant][site-initializer-raylife-ap-rule]=**

    relevant.rule.names=\
        site-initializer-raylife-ap-rule

    test.batch.names[relevant][site-initializer-raylife-ap-rule]=\
        functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][site-initializer-raylife-ap-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][site-initializer-raylife-ap-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Site Initializer Raylife AP") OR \
            (testray.main.component.name ~ "Site Initializer Raylife AP")\
        )