    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][site-initializer-liferay-marketplace-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][site-initializer-liferay-marketplace-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Site Initializer Liferay Marketplace") OR \
            (testray.main.component.name ~ "Site Initializer Liferay Marketplace")\
        )

