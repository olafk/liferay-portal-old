##
## Test Suites
##

    modified.files.includes[relevant][portlet-configuration-rule]=**

    relevant.rule.names=\
        portlet-configuration-rule

    test.batch.names[relevant][portlet-configuration-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portlet-configuration-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][portlet-configuration-rule]=\
        apps/portal-configuration/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][portlet-configuration-rule]=\
        apps/portal-configuration/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portlet-configuration-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.main.component.name ~ "Look And Feel") OR \
            (testray.main.component.name ~ "Web Search")\
        )

##
## Testray
##

    testray.main.component.name=Portal Services