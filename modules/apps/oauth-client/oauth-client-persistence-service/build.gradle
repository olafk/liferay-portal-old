buildService {
	apiDir = "../oauth-client-persistence-api/src/main/java"
	testDir = "../oauth-client-persistence-test/src/testIntegration/java"
}

dependencies {
	compileInclude group: "com.github.stephenc.jcip", name: "jcip-annotations", version: "1.0-1"
	compileInclude group: "com.nimbusds", name: "content-type", version: "2.3"
	compileInclude group: "com.nimbusds", name: "lang-tag", version: "1.7"
	compileInclude group: "com.nimbusds", name: "nimbus-jose-jwt", version: "9.40"
	compileInclude group: "com.nimbusds", name: "oauth2-oidc-sdk", version: "11.13"
	compileInclude group: "com.sun.mail", name: "jakarta.mail", version: "1.6.6"
	compileInclude group: "org.apache.commons", name: "commons-lang3", version: "3.4"

	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "default"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	compileOnly group: "javax.activation", name: "activation", version: "1.1.1"
	compileOnly group: "javax.portlet", name: "portlet-api", version: "3.0.1"
	compileOnly group: "net.minidev", name: "accessors-smart", version: "2.4.9"
	compileOnly group: "net.minidev", name: "json-smart", version: "2.4.10"
	compileOnly group: "org.apache.felix", name: "org.apache.felix.http.servlet-api", version: "1.1.2"
	compileOnly group: "org.osgi", name: "org.osgi.annotation.versioning", version: "1.1.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component", version: "1.4.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.4.0"
	compileOnly group: "org.osgi", name: "osgi.core", version: "6.0.0"
	compileOnly group: "org.ow2.asm", name: "asm", version: "9.7"
	compileOnly project(":apps:oauth-client:oauth-client-persistence-api")
	compileOnly project(":apps:portal:portal-aop-api")
	compileOnly project(":apps:portal:portal-dao-orm-custom-sql-api")
	compileOnly project(":apps:static:osgi:osgi-util")
	compileOnly project(":apps:static:portal:portal-upgrade-api")
	compileOnly project(":core:petra:petra-function")
	compileOnly project(":core:petra:petra-lang")
	compileOnly project(":core:petra:petra-sql-dsl-api")
	compileOnly project(":core:petra:petra-string")
}