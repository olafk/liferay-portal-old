components:
    schemas:
        Collaborator:
            description:
                Represents a collaborator for an entry.
            properties:
                actionIds:
                    description:
                        The collaborator actions for the shared asset.
                    items:
                        type: string
                    type: array
                actions:
                    additionalProperties:
                        type: object
                    # @review
                    description:
                        Block of actions allowed by the user making the request.
                    readOnly: true
                    type: object
                creator:
                    $ref: "../../headless-delivery/headless-delivery-impl/rest-openapi.yaml#Creator"
                    description:
                        The object entry folder's creator.
                    readOnly: true
                dateExpired:
                    description:
                        The expiration date to be a collaborator of the asset.
                    format: date-time
                    type: string
                externalReferenceCode:
                    # @review
                    description:
                        The collaborator external reference code.
                    type: string
                name:
                    description:
                        The collaborator name.
                    readOnly: true
                    type: string
                portrait:
                    description:
                        The collaborator portrait.
                    readOnly: true
                    type: string
                share:
                    description:
                        If the collaborator can share or not the asset.
                    type: boolean
                type:
                    description:
                        The collaborator type.
                    enum: [User,UserGroup]
                    example: User
                    type: string
            required:
                -   actionIds
                -   externalReferenceCode
                -   type
            type: object
        ObjectEntryFolder:
            description:
                Represents a object entry folder that contains objects entries and other object entry folders.
            properties:
                actions:
                    additionalProperties:
                        additionalProperties:
                            type: string
                        type: object
                    # @review
                    description:
                        Block of actions allowed by the user making the request.
                    readOnly: true
                    type: object
                creator:
                    $ref: ../../headless-delivery/headless-delivery-impl/rest-openapi.yaml#Creator
                    description:
                        The object entry folder's creator.
                    readOnly: true
                dateCreated:
                    description:
                        The object entry folder's creation date.
                    format: date-time
                    readOnly: true
                    type: string
                dateModified:
                    description:
                        The last time a field of the folder changed.
                    format: date-time
                    readOnly: true
                    type: string
                externalReferenceCode:
                    # @review
                    description:
                        The object entry folder's external reference code.
                    type: string
                id:
                    description:
                        The object entry folder's ID.
                    format: int64
                    readOnly: true
                    type: integer
                label:
                    description:
                        The object entry folder's label.
                    type: string
                label_i18n:
                    additionalProperties:
                        type: string
                    description:
                        The localized object entry folder's label.
                    type: object
                numberOfObjectEntries:
                    description:
                        The number of object entries in this object entry folder.
                    readOnly: true
                    type: integer
                numberOfObjectEntryFolders:
                    description:
                        The number of this object entry folder's child object entry folders.
                    readOnly: true
                    type: integer
                parentObjectEntryFolderBrief:
                    $ref: "#/components/schemas/ParentObjectEntryFolderBrief"
                    # @review
                    description:
                        The object entry folder's parent, if it exists.
                    readOnly: true
                parentObjectEntryFolderExternalReferenceCode:
                    # @review
                    description:
                        The parent entry folder's external reference code, if it exists.
                    type: string
                parentObjectEntryFolderId:
                    # @review
                    description:
                        The ID of the object entry folder's parent, if it exists.
                    format: int64
                    type: integer
                scopeKey:
                    # @review
                    description:
                        The scope key of the object entry folder.
                    readOnly: true
                    type: string
                title:
                    description:
                        The object entry folder's main title/name.
                    type: string
                viewableBy:
                    description:
                        A write-only property that specifies the object entry folder's default permissions.
                    enum: [Anyone, Members, Owner]
                    type: string
                    writeOnly: true
            required:
                -   title
            type: object
        ParentObjectEntryFolderBrief:
            description:
                Represents a parent object entry folder brief.
            properties:
                externalReferenceCode:
                    # @review
                    description:
                        The parent object entry folder's external reference code.
                    type: string
                id:
                    description:
                        The parent object entry folder's ID.
                    format: int64
                    type: integer
                label:
                    description:
                        The parent object entry folder's label.
                    type: string
                label_i18n:
                    additionalProperties:
                        type: string
                    description:
                        The localized parent object entry folder's label.
                    type: object
                title:
                    description:
                        The parent object entry folder's main title/name.
                    type: string
            type: object
