## Test Suites
##

    modified.files.includes[relevant][nested-portlets-rule]=**

    relevant.rule.names=\
        nested-portlets-rule

    test.batch.names[relevant][nested-portlets-rule]=\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*][relevant][nested-portlets-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][nested-portlets-rule]=\
        apps/nested-portlets/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][nested-portlets-rule]=\
        apps/nested-portlets/**/*Test.java

