##
## Test Suites
##

    modified.files.includes[relevant][adaptive-media-rule]=**

    relevant.rule.names=\
        adaptive-media-rule

    test.batch.names[relevant][adaptive-media-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][adaptive-media-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][adaptive-media-rule]=\
        apps/adaptive-media/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][adaptive-media-rule]=\
        apps/adaptive-media/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][adaptive-media-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Adaptive Media") OR \
            (testray.main.component.name ~ "Adaptive Media")\
        )

##
## Testray
##

    testray.main.component.name=Adaptive Media