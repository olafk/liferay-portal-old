##
## Test Suites
##

    modified.files.includes[relevant][trash-rule]=**

    relevant.rule.names=\
        trash-rule

    test.batch.names[relevant][trash-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][trash-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][trash-rule]=\
        apps/trash/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][trash-rule]=\
        apps/trash/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][trash-rule]=\
        (portal.acceptance == true) AND \
        (testray.main.component.name ~ "Recycle Bin")

##
## Testray
##

    testray.main.component.name=Recycle Bin