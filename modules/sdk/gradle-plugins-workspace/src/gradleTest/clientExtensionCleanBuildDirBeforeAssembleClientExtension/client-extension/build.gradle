task fooTask(type: Copy)
task writeDummyFile

fooTask {
	from "foo"
	include "*.txt"
	into buildDir
}

assembleClientExtension {
	dependsOn writeDummyFile
}

cleanAssembleClientExtension.mustRunAfter(writeDummyFile)

writeDummyFile {
	doLast{
		File clientExtensionBuildDir = new File(buildDir, "liferay-client-extension-build")

		buildDir.mkdir();
		clientExtensionBuildDir.mkdir();

		File dummyFile = new File(clientExtensionBuildDir,"dummy.js")

		dummyFile.write("dummy text");
	}
}