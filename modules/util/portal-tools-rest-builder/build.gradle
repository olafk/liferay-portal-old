apply plugin: "com.liferay.maven.plugin.builder"

sourceCompatibility = "1.8"
targetCompatibility = "1.8"

buildPluginDescriptor {
	ext {
		autoClean = false
	}

	finalizedBy formatSource

	goalPrefix = "rest-builder"
}

copyCSS {
	mustRunAfter buildPluginDescriptor
}

dependencies {
	api group: "com.liferay", name: "org.freemarker", transitive: false, version: "2.3.33.LIFERAY-PATCHED-2"
	api group: "com.puppycrawl.tools", name: "checkstyle", version: "8.43"
	api group: "commons-io", name: "commons-io", version: "2.19.0"
	compileInclude group: "com.beust", name: "jcommander", version: "1.82"
	compileInclude group: "org.yaml", name: "snakeyaml", version: "2.3"
	compileOnly group: "com.liferay", name: "com.liferay.petra.function", version: "5.5.0"
	compileOnly group: "com.liferay", name: "com.liferay.petra.io", version: "5.0.5"
	compileOnly group: "com.liferay", name: "com.liferay.petra.lang", version: "1.0.0"
	compileOnly group: "com.liferay", name: "com.liferay.petra.string", version: "5.0.1"
	compileOnly group: "com.liferay", name: "com.liferay.portal.tools.java.parser", version: "1.0.55"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.impl"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel"
	compileOnly group: "jakarta.annotation", name: "jakarta.annotation-api", version: "2.1.1"
	compileOnly group: "com.liferay", name: "jakarta.ws.rs", version: "3.1.0.LIFERAY-PATCHED-1"
	compileOnly group: "jakarta.xml.bind", name: "jakarta.xml.bind-api", version: "4.0.2"
	compileOnly group: "org.apache.ant", name: "ant", transitive: false, version: "1.10.14"
	compileOnly group: "org.apache.maven", name: "maven-plugin-api", transitive: false, version: "3.0.4"

	constraints {
		compileOnly(group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "109.0.0") {
			because "Java 8 runtime support is required"
		}
		compileOnly(group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "154.0.0") {
			because "Java 8 runtime support is required"
		}
	}
}

deployDependencies {
	from (configurations.compileClasspath) {
		include "checkstyle-*.jar"
		include "org.freemarker-*.jar"
	}

	rename(/checkstyle-(.+)\.jar/, "checkstyle" + renameSuffix)
	rename(/org.freemarker-(.+)\.jar/, "org.freemarker" + renameSuffix)
}

liferay {
	deployDir = "../../../tools/sdk/dependencies/com.liferay.portal.tools.rest.builder/lib"
}

liferayOSGi {
	expandCompileInclude = true
}

updateFileVersions {
	match(/\t\t"com\.liferay\.portal\.tools\.rest\.builder\.version": "(\d.+)",/, "../../build.gradle")
	match(/\t\t<dependency name="com.liferay.portal.tools.rest.builder" org="com.liferay" rev="(\d.+)" \/>/, "../../../tools/sdk/dependencies/com.liferay.portal.tools.rest.builder/ivy.xml")
	match(/\t\t\t\t<version>(\d.+)<\/version>/, "samples/pom.xml")
	match(/com\.liferay\.portal\.tools\.rest\.builder=(\d.+)/, "../../sdk/gradle-plugins/src/main/resources/com/liferay/gradle/plugins/dependencies/portal-tools.properties")

	replaceOnlyIf([{
		String group, String replacement, String content, File contentFile ->

		if (contentFile.parentFile.name == "__artifactId__-impl") {
			return false
		}

		return true
	}])
}