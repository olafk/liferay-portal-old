components:
    schemas:
        ChildTestEntity1:
            allOf:
                - $ref: "#/components/schemas/TestEntity"
                - properties:
                      property1:
                          type: string
            type: object
        ChildTestEntity2:
            allOf:
                - $ref: "#/components/schemas/TestEntity"
                - properties:
                      property2:
                          type: string
            type: object
        ChildTestEntity3:
            allOf:
                - $ref: "#/components/schemas/TestEntity"
            type: object
        CompanyTestEntity:
            properties:
                dateCreated:
                    format: date-time
                    type: string
                dateModified:
                    format: date-time
                    type: string
                description:
                    type: string
                externalReferenceCode:
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
                permissions:
                    items:
                        type: permission
                    type: array
            type: object
        EntityModelResourceTestEntity1:
            description:
                "A EntityModelResource test entity with no filterable fields."
            properties:
                id:
                    format: int64
                    type: integer
                name:
                    type: string
            type: object
        EntityModelResourceTestEntity2:
            description:
                "A EntityModelResource test entity (`implements EntityModelResource` in the
                EntityModelResourceTestEntity2ResourceImpl class) with filterable fields."
            properties:
                id:
                    format: int64
                    type: integer
                name:
                    type: string
            type: object
        EnumTestEntity:
            properties:
                testEnum:
                    enum: [-1em, -0.95em, 1em, 0.95em]
                    type: string
            type: object
        JSONMapAttributeTestEntity:
            description:
                Test Component to test the generation of getValue method on Entities when one or multiple JSON Maps are
                present.
            properties:
                description:
                    type: string
                name:
                    type: string
                properties1:
                    additionalProperties:
                        type: object
                    type: object
                    x-json-map: true
                properties2:
                    additionalProperties:
                        type: object
                    type: object
                    x-json-map: true
            title: JSONMapAttributeTestEntity
            type: object
        NestedArrayItemsTestEntity:
            description:
                Test Component to test the REST Builder support for nested array items
            properties:
                name:
                    type: string
                values:
                    items:
                        items:
                            type: string
                        type: array
                    type: array
            title: NestedArrayItemsTestEntity
            type: object
        NestedTestEntity:
            description:
                "https://www.schema.org/Folder"
            properties:
                dateCreated:
                    format: date-time
                    type: string
                dateModified:
                    format: date-time
                    type: string
                description:
                    type: string
                id:
                    format: int64
                    type: integer
                name:
                    type: string
                testEntity:
                    $ref: "#/components/schemas/TestEntity"
            type: object
        SiteTestEntity:
            properties:
                dateCreated:
                    format: date-time
                    type: string
                dateModified:
                    format: date-time
                    type: string
                description:
                    type: string
                externalReferenceCode:
                    type: string
                id:
                    format: int64
                    readOnly: true
                    type: integer
                permissions:
                    items:
                        type: permission
                    type: array
                siteId:
                    format: int64
                    readOnly: true
                    type: integer
            type: object
        TestEntity:
            description:
                "https://www.schema.org/Document"
            discriminator:
                mapping:
                    ChildTestEntity1: "#/components/schemas/ChildTestEntity1"
                    ChildTestEntity2: "#/components/schemas/ChildTestEntity2"
                    ChildTestEntity3: "#/components/schemas/ChildTestEntity3"
                propertyName: type
            properties:
                dateCreated:
                    format: date-time
                    type: string
                dateModified:
                    format: date-time
                    type: string
                description:
                    type: string
                documentId:
                    format: int64
                    type: integer
                id:
                    format: int64
                    readOnly: true
                    type: integer
                jsonProperty:
                    type: string
                    xml:
                        name: xmlProperty
                name:
                    type: string
                nestedTestEntity:
                    $ref: "#/components/schemas/NestedTestEntity"
                self:
                    type: string
                testEntities:
                    $ref: "#/components/schemas/TestEntity"
                type:
                    enum:
                        - ChildTestEntity1
                        - ChildTestEntity2
                        - ChildTestEntity3
                    type: string
            type: object
        TestEntityAddress:
            description:
                "https://www.schema.org/Document"
            properties:
                dateCreated:
                    format: date-time
                    type: string
                dateModified:
                    format: date-time
                    type: string
                description:
                    type: string
                documentId:
                    format: int64
                    type: integer
                id:
                    format: int64
                    readOnly: true
                    type: integer
                jsonProperty:
                    type: string
                    xml:
                        name: xmlProperty
                name:
                    type: string
            type: object
        UnreferencedTestEntity:
            properties:
                description:
                    type: string
                id:
                    format: int64
                    type: integer
                property-with-hyphens:
                    type: string
