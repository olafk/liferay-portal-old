buildWSDL {
	axisVersion = 2

	generateOptions {
		backwordCompatible = true
		databinding = "xmlbeans"
		flattenFiles = true
		generateAll = true
		serverSide = true
	}
}

dependencies {
	compileInclude group: "com.liferay", name: "org.apache.axis2.adb", version: "1.8.0.JAKARTA-LIFERAY-PATCHED-1"
	compileInclude group: "com.liferay", name: "org.apache.axis2.adb.codegen", version: "1.8.0.JAKARTA-LIFERAY-PATCHED-1"
	compileInclude group: "com.liferay", name: "org.apache.axis2.jaxws", version: "1.8.0.JAKARTA-LIFERAY-PATCHED-1"
	compileInclude group: "com.liferay", name: "org.apache.axis2.kernel", version: "1.8.0.JAKARTA-LIFERAY-PATCHED-1"
	compileInclude group: "com.liferay", name: "org.apache.axis2.saaj", version: "1.8.0.JAKARTA-LIFERAY-PATCHED-1"
	compileInclude group: "com.liferay", name: "org.apache.axis2.transport.http", version: "1.8.0.JAKARTA-LIFERAY-PATCHED-1"
	compileInclude group: "com.liferay", name: "org.apache.ws.commons.axiom.api", version: "1.3.0.JAKARTA-LIFERAY-PATCHED-1"
	compileInclude group: "com.liferay", name: "org.apache.ws.commons.axiom.impl", version: "1.3.0.JAKARTA-LIFERAY-PATCHED-1"
	compileInclude group: "commons-cli", name: "commons-cli", version: "1.3.1"
	compileInclude group: "org.apache.axis2", name: "axis2", version: "1.8.0"
	compileInclude group: "org.apache.axis2", name: "axis2-transport-local", version: "1.8.0"
	compileInclude group: "org.apache.axis2", name: "axis2-xmlbeans", version: "1.8.0"
	compileInclude group: "org.apache.httpcomponents", name: "httpclient", version: "4.5.13"
	compileInclude group: "org.apache.httpcomponents", name: "httpcore", version: "4.4.14"
	compileInclude group: "org.apache.neethi", name: "neethi", version: "3.1.1"
	compileInclude group: "org.apache.woden", name: "woden-api", version: "1.0M9"
	compileInclude group: "org.apache.ws.xmlschema", name: "xmlschema-core", version: "2.2.1"
	compileInclude group: "org.apache.xmlbeans", name: "xmlbeans", version: "3.1.0"
	compileInclude group: "wsdl4j", name: "wsdl4j", version: "1.6.3"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	compileOnly group: "commons-codec", name: "commons-codec", version: "1.15"
	compileOnly group: "jakarta.annotation", name: "jakarta.annotation-api", version: "2.1.1"
	compileOnly group: "jakarta.servlet", name: "jakarta.servlet-api", version: "6.0.0"
	compileOnly group: "jakarta.xml.bind", name: "jakarta.xml.bind-api", version: "4.0.2"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.4.0"
	compileOnly project(":apps:document-library:document-library-repository-external-api")
	compileOnly project(":core:petra:petra-function")
	compileOnly project(":core:petra:petra-string")
	testImplementation group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "default"
}