##
## Test Suites
##

    modified.files.includes[relevant][multi-factor-authentication-rule]=**

    relevant.rule.names=\
        multi-factor-authentication-rule

    test.batch.names[relevant][multi-factor-authentication-rule]=\
        functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][multi-factor-authentication-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][multi-factor-authentication-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Multi Factor Authentication") OR \
            (testray.main.component.name ~ "Multi Factor Authentication")\
        )

