##
## Test Suites
##

    modified.files.includes[relevant][multi-factor-authentication-rule]=**

    relevant.rule.names=\
        multi-factor-authentication-rule

    test.batch.names[relevant][multi-factor-authentication-rule]=\
        functional-tomcat90-mysql57,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*][relevant][multi-factor-authentication-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][multi-factor-authentication-rule]=\
        dxp/apps/multi-factor-authentication/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][multi-factor-authentication-rule]=\
        dxp/apps/multi-factor-authentication/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*][relevant][multi-factor-authentication-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Multi Factor Authentication") OR \
            (testray.main.component.name ~ "Multi Factor Authentication")\
        )

##
## Testray
##

    testray.main.component.name=Multi Factor Authentication