##
## Test Suites
##

    modified.files.includes[relevant][search-experiences-rule]=**

    relevant.rule.names=\
        search-experiences-rule

    test.batch.names[relevant][search-experiences-rule]=\
        functional-tomcat90-mysql57,\
        functional-upgrade-tomcat90-mysql57,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8,\
        playwright-js-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*][relevant][search-experiences-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][search-experiences-rule]=\
        dxp/apps/search-experiences/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][search-experiences-rule]=\
        dxp/apps/search-experiences/**/*Test.java

    playwright.test.project[playwright-js-tomcat90-mysql57-jdk8][relevant][search-experiences-rule]=search-experiences-web

    test.batch.run.property.query[functional-tomcat*-mysql*][relevant][search-experiences-rule]=\
        (\
            (portal.acceptance == true) AND \
            (portal.suite.search.engine ~ "elasticsearch7")\
        ) OR \
        (test.class.name == Blueprints) OR \
        (test.class.name == SemanticSearch)

    test.batch.run.property.query[functional-upgrade-tomcat*-mysql*][relevant][search-experiences-rule]=\
        (portal.suite.search.engine ~ "elasticsearch7") AND \
        (testray.main.component.name ~ "Upgrades Search")

##
## Testray
##

    testray.main.component.name=Search Experiences