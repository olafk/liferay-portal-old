components:
    schemas:
        Attribute:
            properties:
                canonicalValues:
                    description:
                        A collection of suggested canonical values that MAY be used (e.g., "work" and "home").
                    items:
                        type: string
                    type: array
                caseExact:
                    description:
                        A Boolean value that specifies whether or not a string attribute is case sensitive
                    type: boolean
                description:
                    description:
                        The attribute's human-readable description.  When
                        applicable, service providers MUST specify the description
                    type: string
                multiValued:
                    description:
                        A Boolean value indicating the attribute's plurality.
                    type: boolean
                mutability:
                    description:
                        A single keyword indicating the circumstances under which the value of the attribute can be
                        (re)defined.
                    enum: [readOnly, readWrite, immutable, writeOnly]
                    type: string
                name:
                    description:
                        The attribute's name.
                    type: string
                referenceTypes:
                    description:
                        A multi-valued array of JSON strings that indicate the SCIM resource types that may be
                        referenced
                    items:
                        type: string
                    type: array
                required:
                    description:
                        A Boolean value that specifies whether or not the attribute is required.
                    type: boolean
                returned:
                    description:
                        A single keyword that indicates when an attribute and associated values are returned in response
                        to a GET request or in response to a PUT, POST, or PATCH request.
                    enum: [always, never, default, request]
                    type: string
                subAttributes:
                    items:
                        $ref: "#/components/schemas/Attribute"
                    type: array
                type:
                    description:
                        The attribute's data type.  Valid values are "string", "boolean", "decimal", "integer",
                        "dateTime", "reference", and "complex".
                    enum: [string, boolean, decimal, integer, dateTime, reference, complex]
                    type: string
                uniqueness:
                    description:
                        A single keyword value that specifies how the service provider enforces uniqueness of attribute
                        values.
                    enum: [none, server, global]
                    type: string
            type: object
        AuthenticationScheme:
            description:
                The authentication schemes supported by the service provider.
            properties:
                description:
                    readOnly: true
                    type: string
                documentationUri:
                    readOnly: true
                    type: string
                name:
                    readOnly: true
                    type: string
                primary:
                    readOnly: true
                    type: boolean
                specUri:
                    readOnly: true
                    type: string
                type:
                    readOnly: true
                    type: string
            type: object
        BaseScim:
            description:
                Each SCIM resource (Users, Groups, etc.) includes the following common attributes.
            properties:
                externalId:
                    description:
                        A String that is an identifier for the resource as defined by the provisioning client.
                    type: string
                id:
                    description:
                        A unique identifier for a SCIM resource as defined by the service provider.
                    readOnly: true
                    type: string
                meta:
                    $ref: "#/components/schemas/Meta"
                schemas:
                    description:
                        A multi-valued list of strings indicating the namespaces of the SCIM schemas that define the
                        attributes present in the current JSON structure.
                    items:
                        type: string
                    type: array
            type: object
        Filter:
            properties:
                maxResults:
                    readOnly: true
                    type: integer
                supported:
                    readOnly: true
                    type: boolean
            type: object
        Group:
            allOf:
                -   $ref: "#/components/schemas/BaseScim"
                -   properties:
                        displayName:
                            description:
                                A human-readable name for the Group.
                            type: string
                        members:
                            description:
                                A list of members of the Group.
                            items:
                                $ref: "#/components/schemas/MultiValuedAttribute"
                            type: array
                    type: object
        Meta:
            description:
                A complex attribute containing resource metadata.
            properties:
                created:
                    description:
                        The "DateTime" that the resource was added to the service provider.
                    format: date-time
                    type: string
                lastModified:
                    description:
                        The most recent DateTime that the details of this resource were updated at the service provider.
                    format: date-time
                    type: string
                location:
                    description:
                        The URI of the resource being returned.
                    type: string
                resourceType:
                    description:
                        The name of the resource type of the resource.
                    type: string
                version:
                    description:
                        The version of the resource being returned.
                    type: string
            readOnly: true
            type: object
        MultiValuedAttribute:
            description:
                Multi-valued attributes contain a list of elements using the JSON array format.
            properties:
                $ref:
                    description:
                        The reference URI of a target resource, if the attribute is a reference.
                    type: string
                display:
                    description:
                        A human-readable name, primarily used for display purposes and having a mutability of
                        "immutable".
                    type: string
                primary:
                    description:
                        Boolean value indicating the 'primary' or preferred attribute value for this attribute, e.g.,
                        the preferred mailing address or the primary email address.
                    type: boolean
                type:
                    description:
                        A label indicating the attribute's function, e.g., "work" or "home".
                    type: string
                value:
                    description:
                        The attribute's significant value, e.g., email address, phone number.
                    type: string
            type: object
        Operation:
            properties:
                op:
                    description:
                        The method that should be used in the operation. Possible values are add, remove and replace.
                    pattern: ^[Aa][dd]|[Rr][emove]|[Rr][eplace]$
                    type: string
                path:
                    description:
                        The path to the specify attribute/sub-attribute that should be updated.
                    type: string
                value:
                    description:
                        The value that should be updated.
                    oneOf:
                        -   type: array
                        -   type: boolean
                        -   type: integer
                        -   type: number
                        -   type: string
            type: object
        PatchOp:
            properties:
                Operations:
                    items:
                        $ref: "#/components/schemas/Operation"
                    type: array
                schemas:
                    description:
                        The schema associated to this operation.
                    items:
                        enum: ["urn:ietf:params:scim:api:messages:2.0:PatchOp"]
                        type: string
                    type: array
            type: object
        QueryAttributes:
            properties:
                attributes:
                    description:
                        A multi-valued list of strings indicating the names of resource attributes to return in the
                        response, overriding the set of attributes that would be returned by default.
                    items:
                        type: string
                    type: array
                count:
                    description:
                        An integer indicating the desired maximum number of query results per page.
                    type: integer
                excludedAttributes:
                    description:
                        A multi-valued list of strings indicating the names of resource attributes to be removed from
                        the default set of attributes to return.
                    items:
                        type: string
                    type: array
                filter:
                    description:
                        The filter string used to request a subset of resources.
                    type: string
                sortBy:
                    description:
                        A string indicating the attribute whose value SHALL be used to order the returned responses.
                    type: string
                sortOrder:
                    description:
                        A string indicating the order in which the "sortBy" parameter is applied.
                    type: string
                startIndex:
                    description:
                        An integer indicating the 1-based index of the first query result.
                    type: integer
            type: object
        QueryResponse:
            properties:
                Resources:
                    description:
                        A multi-valued list of complex objects containing the requested resources.
                    oneOf:
                        -   $ref: "#/components/schemas/Group"
                        -   $ref: "#/components/schemas/ResourceType"
                        -   $ref: "#/components/schemas/Schema"
                        -   $ref: "#/components/schemas/User"
                    type: object
                itemsPerPage:
                    description:
                        The number of resources returned in a list response page.
                    type: integer
                startIndex:
                    description:
                        The 1-based index of the first result in the current set of list results.
                    type: integer
                totalResults:
                    description:
                        The total number of results returned by the list or query operation.
                    type: integer
            type: object
        ResourceType:
            properties:
                description:
                    description:
                        The resource type's human-readable description.
                    type: string
                endpoint:
                    description:
                        The resource type's HTTP-addressable endpoint relative to the Base URL of the service provider.
                    type: string
                id:
                    description:
                        The resource type's server unique id.
                    readOnly: true
                    type: string
                meta:
                    $ref: "#/components/schemas/Meta"
                name:
                    description:
                        The resource type name.
                    type: string
                schema:
                    description:
                        The resource type's primary/base schema URI.
                    type: string
                schemas:
                    description:
                        A list of URIs of the resource type's schema extensions
                    items:
                        allOf:
                            -   properties:
                                    required:
                                        description:
                                            A Boolean value that specifies whether or not the schema extension is
                                            required for the resource type.
                                        type: boolean
                                    schema:
                                        description:
                                            The resource type's primary/base schema URI.
                                        type: string
                        type: object
                    type: array
            type: object
        Schema:
            properties:
                attributes:
                    description:
                        A complex type that defines service provider attributes and their qualities.
                    items:
                        $ref: "#/components/schemas/Attribute"
                    type: array
                description:
                    description:
                        The schema's human-readable description.
                    type: string
                id:
                    description:
                        The unique URI of the schema.
                    readOnly: true
                    type: string
                meta:
                    $ref: "#/components/schemas/Meta"
                name:
                    description:
                        The schema's human-readable name.
                    type: string
                schemas:
                    description:
                        "A list of strings that MUST contain the value 'urn:ietf:params:scim:schemas:core:2.0:Schema'."
                    example: ["urn:ietf:params:scim:schemas:core:2.0:Schema"]
                    items:
                        type: string
                    type: array
            type: object
        ServiceProviderConfig:
            properties:
                authenticationSchemes:
                    items:
                        $ref: "#/components/schemas/AuthenticationScheme"
                    type: array
                bulk:
                    properties:
                        maxOperations:
                            readOnly: true
                            type: integer
                        maxPayloadSize:
                            readOnly: true
                            type: integer
                        supported:
                            readOnly: true
                            type: boolean
                    type: object
                changePassword:
                    properties:
                        supported:
                            readOnly: true
                            type: boolean
                    type: object
                documentationUri:
                    readOnly: true
                    type: string
                etag:
                    properties:
                        supported:
                            readOnly: true
                            type: boolean
                    type: object
                filter:
                    $ref: "#/components/schemas/Filter"
                meta:
                    $ref: "#/components/schemas/Meta"
                patch:
                    properties:
                        supported:
                            readOnly: true
                            type: boolean
                    type: object
                schemas:
                    items:
                        enum: ["urn:ietf:params:scim:schemas:core:2.0:ServiceProviderConfig"]
                        readOnly: true
                        type: string
                    type: array
                sort:
                    $ref: "#/components/schemas/Sort"
            type: object
        Sort:
            properties:
                supported:
                    readOnly: true
                    type: boolean
            type: object
        User:
            allOf:
                -   $ref: "#/components/schemas/BaseScim"
                -   properties:
                        active:
                            description:
                                A Boolean value indicating the user's administrative status.
                            type: boolean
                        addresses:
                            description:
                                A physical mailing address for this user.
                            items:
                                allOf:
                                    -   $ref: "#/components/schemas/MultiValuedAttribute"
                                    -   properties:
                                            country:
                                                description:
                                                    The country name component.
                                                type: string
                                            formatted:
                                                description:
                                                    The full mailing address, formatted for display or use with a
                                                    mailing label.
                                                type: string
                                            locality:
                                                description:
                                                    The city or locality component.
                                                type: string
                                            postalCode:
                                                description:
                                                    The zip code or postal code component.
                                                type: string
                                            region:
                                                description:
                                                    The state or region component.
                                                type: string
                                            streetAddress:
                                                description:
                                                    The full street address component, which may include house number,
                                                    street name, P.O. box, and multi-line extended street address
                                                    information.
                                                type: string
                                        type: object
                                type: object
                            type: array
                        displayName:
                            description:
                                The name of the user, suitable for display to end-users.
                            type: string
                        emails:
                            description:
                                Email addresses for the User.
                            items:
                                $ref: "#/components/schemas/MultiValuedAttribute"
                            type: array
                        entitlements:
                            description:
                                A list of entitlements for the user that represent a thing the user has.
                            items:
                                $ref: "#/components/schemas/MultiValuedAttribute"
                            type: array
                        groups:
                            description:
                                A list of groups to which the user belongs, either through direct membership, through
                                nested groups, or dynamically calculated.
                            items:
                                $ref: "#/components/schemas/MultiValuedAttribute"
                            type: array
                        ims:
                            description:
                                Instant messaging address for the user.
                            items:
                                $ref: "#/components/schemas/MultiValuedAttribute"
                            type: array
                        locale:
                            description:
                                Used to indicate the User's default location for purposes of localizing such items as
                                currency, date time format, or numerical representations.
                            type: string
                        name:
                            description:
                                The components of the user's name.
                            properties:
                                familyName:
                                    type: string
                                formatted:
                                    type: string
                                givenName:
                                    type: string
                                honorificPrefix:
                                    type: string
                                honorificSuffix:
                                    type: string
                                middleName:
                                    type: string
                            type: object
                        nickName:
                            description:
                                The casual way to address the user in real life, e.g., "Bob" or "Bobby" instead of
                                "Robert".
                            type: string
                        password:
                            description:
                                This attribute is intended to be used as a means to set, replace, or compare (i.e.,
                                filter for equality) a password.
                            type: string
                            writeOnly: true
                        phoneNumbers:
                            description:
                                Phone numbers for the user.
                            items:
                                $ref: "#/components/schemas/MultiValuedAttribute"
                            type: array
                        photos:
                            description:
                                A URI that is a uniform resource locator that points to a resource location representing
                                the user's image.
                            items:
                                $ref: "#/components/schemas/MultiValuedAttribute"
                            type: array
                        preferredLanguage:
                            description:
                                Indicates the user's preferred written or spoken languages and is generally used for
                                selecting a localized user interface.
                            type: string
                        profileUrl:
                            description:
                                A URI that is a uniform resource locator and that points to a location representing the
                                user's online profile (e.g., a web page).
                            type: string
                        roles:
                            description:
                                A list of roles for the user that collectively represent who the user is, e.g.,
                                "Student", "Faculty".
                            items:
                                $ref: "#/components/schemas/MultiValuedAttribute"
                            type: array
                        timezone:
                            description:
                                The User's time zone, in IANA Time Zone database format, also known as the "Olson" time
                                zone database format (e.g., "America/Los_Angeles").
                            type: string
                        title:
                            description:
                                The user's title, such as "Vice President".
                            type: string
                        urn:ietf:params:scim:schemas:extension:liferay:2.0:User:
                            $ref: "#/components/schemas/UserSchemaExtension"
                            description:
                                The components of the Liferay's User Schema Extension.
                            type: UserSchemaExtension
                        userName:
                            description:
                                A service provider's unique identifier for the user, typically used by the user to
                                directly authenticate to the service provider.
                            type: string
                        userType:
                            description:
                                Used to identify the relationship between the organization and the user.
                            type: string
                        x509Certificates:
                            description:
                                A list of certificates associated with the resource (e.g., a User).
                            items:
                                $ref: "#/components/schemas/MultiValuedAttribute"
                            type: array
                    type: object
        UserSchemaExtension:
            description:
                Liferay's User Schema Extension.
            properties:
                birthday:
                    format: date
                    type: string
                male:
                    type: boolean
            type: object
info:
    description:
        "Liferay SCIM endpoints. A Java client JAR is available for use with the group ID 'com.liferay', artifact ID
        'com.liferay.scim.rest.client', and version '1.0.14'."
    license:
        name: Apache 2.0
        url: http://www.apache.org/licenses/LICENSE-2.0.html
    title: System for Cross-domain Identity Management
    version: v1.0
openapi: 3.0.1
paths:
    /v2/Groups:
        get:
            description:
                Lists groups.
            operationId: getV2Groups
            parameters:
                -   in: query
                    name: count
                    schema:
                        type: integer
                -   in: query
                    name: excludedAttributes
                    schema:
                        type: string
                -   in: query
                    name: filter
                    schema:
                        type: string
                -   in: query
                    name: startIndex
                    schema:
                        type: integer
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/QueryResponse"
                    description:
                        The list of groups.
            tags: ["Group"]
        post:
            description:
                Creates a group.
            operationId: postV2Group
            requestBody:
                content:
                    application/scim+json:
                        schema:
                            $ref: "#/components/schemas/Group"
            responses:
                201:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/Group"
                    description:
                        The Group was successfully created.
            tags: ["Group"]
    /v2/Groups/.search:
        post:
            description:
                Query groups.
            operationId: postV2GroupSearch
            requestBody:
                content:
                    application/scim+json:
                        schema:
                            $ref: "#/components/schemas/QueryAttributes"
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/QueryResponse"
                    description:
                        List of found groups based on query
            tags: ["Group"]
    /v2/Groups/{id}:
        delete:
            description:
                Deletes a group.
            operationId: deleteV2Group
            parameters:
                -   in: path
                    name: id
                    required: true
                    schema:
                        type: string
            responses:
                204:
                    description:
                        In response to a successful DELETE, the server SHALL return a successful HTTP status code 204
                        (No Content).
            tags: ["Group"]
        get:
            description:
                Retrieves a group.
            operationId: getV2GroupById
            parameters:
                -   in: path
                    name: id
                    required: true
                    schema:
                        type: string
                -   in: query
                    name: excludedAttributes
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/Group"
                    description:
                        If the resource exists, the server responds with HTTP status code 200 (OK) and includes the
                        result in the body of the response.
            tags: ["Group"]
        patch:
            description:
                Updates a group.
            operationId: patchV2Group
            parameters:
                -   in: path
                    name: id
                    required: true
                    schema:
                        type: string
            requestBody:
                content:
                    application/scim+json:
                        schema:
                            $ref: "#/components/schemas/PatchOp"
            responses:
                204:
                    description:
                        The Group was successfully updated.
            tags: ["Group"]
        put:
            description:
                Updates a group.
            operationId: putV2Group
            parameters:
                -   in: path
                    name: id
                    required: true
                    schema:
                        type: string
            requestBody:
                content:
                    application/scim+json:
                        schema:
                            $ref: "#/components/schemas/Group"
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/Group"
                    description:
                        The Group was successfully updated.
            tags: ["Group"]
    /v2/ResourceTypes:
        get:
            description:
                To discover the types of resources available on a SCIM service provider.
            operationId: getV2ResourceTypes
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/QueryResponse"
                    description:
                        The list of Resource Types.
            tags: ["ResourceTypes"]
    /v2/ResourceTypes/{id}:
        get:
            operationId: getV2ResourceTypeById
            parameters:
                -   in: path
                    description:
                        Resource type defines the endpoints.
                    name: id
                    required: true
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/ResourceType"
                    description:
                        The requested resource types.
                404:
                    description:
                        ResourceTypes not found.
            tags: ["ResourceTypes"]
    /v2/Schemas:
        get:
            description:
                Lists schemas.
            operationId: getV2Schemas
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/QueryResponse"
                    description:
                        The list of Schemas.
            tags: ["Schema"]
    /v2/Schemas/{id}:
        get:
            operationId: getV2SchemaById
            parameters:
                -   in: path
                    description:
                        The schema's unique identifier.
                    name: id
                    required: true
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/Schema"
                    description:
                        The requested schema.
                404:
                    description:
                        Schema not found.
            tags: ["Schema"]
    /v2/ServiceProviderConfig:
        get:
            description:
                Gives serviceProviderConfig info.
            operationId: getV2ServiceProviderConfig
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/ServiceProviderConfig"
                    description:
                        The ServiceProviderConfig info.
            tags: ["ServiceProviderConfig"]
    /v2/Users:
        get:
            description:
                Lists users.
            operationId: getV2Users
            parameters:
                -   in: query
                    name: count
                    schema:
                        type: integer
                -   in: query
                    name: filter
                    schema:
                        type: string
                -   in: query
                    name: startIndex
                    schema:
                        type: integer
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/QueryResponse"
                    description:
                        The list of users.
            tags: ["User"]
        post:
            description:
                Creates a user.
            operationId: postV2User
            requestBody:
                content:
                    application/scim+json:
                        schema:
                            $ref: "#/components/schemas/User"
            responses:
                201:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/User"
                    description:
                        The User was successfully created.
            tags: ["User"]
    /v2/Users/.search:
        post:
            description:
                Query users.
            operationId: postV2UserSearch
            requestBody:
                content:
                    application/scim+json:
                        schema:
                            $ref: "#/components/schemas/QueryAttributes"
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/QueryResponse"
                    description:
                        List of found users based on query
            tags: ["User"]
    /v2/Users/{id}:
        delete:
            description:
                Deletes a user.
            operationId: deleteV2User
            parameters:
                -   in: path
                    name: id
                    required: true
                    schema:
                        type: string
            responses:
                204:
                    description:
                        In response to a successful DELETE, the server SHALL return a successful HTTP status code 204
                        (No Content).
            tags: ["User"]
        get:
            description:
                Retrieves a user.
            operationId: getV2UserById
            parameters:
                -   in: path
                    name: id
                    required: true
                    schema:
                        type: string
            responses:
                200:
                    content:
                        application/scim+json:
                            schema:
                                oneOf:
                                    -   format: binary
                                        type: string
                                    -   $ref: "#/components/schemas/User"
                    description:
                        If the resource exists, the server responds with HTTP status code 200 (OK) and includes the
                        result in the body of the response.
            tags: ["User"]
        patch:
            description:
                Updates a user.
            operationId: patchV2User
            parameters:
                -   in: path
                    name: id
                    required: true
                    schema:
                        type: string
            requestBody:
                content:
                    application/scim+json:
