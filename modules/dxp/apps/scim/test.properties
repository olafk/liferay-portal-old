##
## Test Suites
##

    modified.files.includes[relevant][scim-rule]=**

    relevant.rule.names=\
        scim-rule

    test.batch.names[relevant][scim-rule]=\
        functional-tomcat90-mysql57,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*][relevant][scim-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][scim-rule]=\
        dxp/apps/scim/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][scim-rule]=\
        dxp/apps/scim/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*][relevant][scim-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "SCIM") OR \
            (testray.main.component.name ~ "SCIM")\
        )

##
## Testray
##

    testray.main.component.name=SCIM