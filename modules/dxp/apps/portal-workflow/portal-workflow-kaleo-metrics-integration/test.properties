##
## Modules
##

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][portal-workflow-kaleo-metrics-integration-rule]=\
        apps/portal-workflow/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][portal-workflow-kaleo-metrics-integration-rule]=\
        apps/portal-workflow/**/*Test.java

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-workflow-kaleo-metrics-integration-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-workflow-kaleo-metrics-integration-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "Workflow") OR \
            (testray.main.component.name ~ "Kaleo Designer") OR \
            (testray.main.component.name ~ "Kaleo Forms Admin") OR \
            (testray.main.component.name ~ "Workflow") OR \
            (testray.main.component.name ~ "Workflow Metrics")\
        )

    test.batch.run.property.query[functional-upgrade-tomcat*-mysql*-jdk8][relevant][portal-workflow-kaleo-metrics-integration-rule]=\
        (testray.main.component.name == "Upgrades Workflow")

##
## Test Suites
##

    modified.files.includes[relevant][portal-workflow-kaleo-metrics-integration-rule]=**

    relevant.rule.names=\
        portal-workflow-kaleo-metrics-integration-rule

    test.batch.names[relevant][portal-workflow-kaleo-metrics-integration-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        functional-upgrade-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8