##
## Test Suites
##

    modified.files.includes[relevant][saml-rule]=**

    relevant.rule.names=\
        saml-rule

    test.batch.names[relevant][saml-rule]=\
        functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][saml-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][saml-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "SAML") OR \
            (testray.main.component.name ~ "SAML")\
        )

##
## Testray
##

    testray.main.component.name=SAML