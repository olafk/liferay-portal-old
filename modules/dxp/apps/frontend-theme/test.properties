    modified.files.includes[relevant][frontend-theme-rule]=**

    relevant.rule.names=\
        frontend-theme-rule

    test.batch.names[relevant][frontend-theme-rule]=\
        functional-tomcat90-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][frontend-theme-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][frontend-theme-rule]=\
        (portal.acceptance == true) AND \
        (testray.component.names ~ "Theme")

