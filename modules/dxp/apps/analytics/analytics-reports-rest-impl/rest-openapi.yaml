components:
    schemas:
        AssetMetric:
            properties:
                assetId:
                    type: string
                assetTitle:
                    type: string
                assetType:
                    type: string
                dataSourceId:
                    type: string
                defaultMetric:
                    $ref: "#/components/schemas/Metric"
                selectedMetrics:
                    items:
                        $ref: "#/components/schemas/Metric"
                    type: array
        Metric:
            properties:
                metricType:
                    type: string
                previousValue:
                    format: double
                    type: number
                previousValueKey:
                    type: string
                value:
                    format: double
                    type: number
                valueKey:
                    type: string
info:
    license:
        name: "Apache 2.0"
        url: "http://www.apache.org/licenses/LICENSE-2.0.html"
    title: ""
    version: v1.0
openapi: 3.0.1
paths:
    "{groupId}/asset-metrics/{assetType}":
        get:
            operationId: getGroupAssetMetric
            parameters:
                - in: path
                  name: groupId
                  schema:
                      format: int64
                      type: integer
                - in: path
                  name: assetType
                  schema:
                      type: string
                - in: query
                  name: assetId
                  schema:
                      type: string
                - in: query
                  name: identityType
                  schema:
                      enum: [ALL, KNOWN, UNKNOWN]
                      type: string
                - in: query
                  name: rangeKey
                  schema:
                      type: integer
                - in: query
                  name: selectedMetrics
                  schema:
                      items:
                          type: string
                      type: array
            responses:
                200:
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AssetMetric"
                        application/xml:
                            schema:
                                $ref: "#/components/schemas/AssetMetric"
            tags: ["AssetMetric"]