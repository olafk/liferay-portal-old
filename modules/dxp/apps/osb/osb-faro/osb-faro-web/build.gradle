import com.liferay.gradle.plugins.node.task.YarnInstallTask

task osbYarnInstall(type: YarnInstallTask)
task osbYarnTest(type: Exec)
task osbYarnWebpack(type: Exec)

dependencies {
	compileInclude group: "com.fasterxml.jackson.core", name: "jackson-annotations", version: "2.18.2"
	compileInclude group: "com.fasterxml.jackson.core", name: "jackson-core", version: "2.18.2"
	compileInclude group: "com.fasterxml.jackson.core", name: "jackson-databind", version: "2.18.2"
	compileInclude group: "com.fasterxml.jackson.jakarta.rs", name: "jackson-jakarta-rs-base", version: "2.18.2"
	compileInclude group: "com.fasterxml.jackson.jakarta.rs", name: "jackson-jakarta-rs-json-provider", version: "2.18.2"
	compileInclude group: "com.github.albfernandez", name: "juniversalchardet", version: "2.4.0"
	compileInclude group: "com.github.scribejava", name: "scribejava-core", version: "6.6.3"
	compileInclude group: "com.univocity", name: "univocity-parsers", version: "2.9.1"
	compileInclude group: "commons-codec", name: "commons-codec", version: "1.15"
	compileInclude group: "fi.solita.clamav", name: "clamav-client", version: "1.0.1"
	compileInclude group: "jakarta.annotation", name: "jakarta.annotation-api", version: "2.1.1"
	compileInclude group: "org.apache.commons", name: "commons-lang3", version: "3.0"
	compileInclude group: "org.apache.httpcomponents", name: "httpclient", version: "4.5.13"
	compileInclude group: "org.apache.httpcomponents", name: "httpcore", version: "4.4.14"
	compileOnly group: "com.liferay", name: "jakarta.ws.rs", version: "3.1.0.LIFERAY-PATCHED-2"
	compileOnly group: "com.liferay", name: "org.apache.cxf.core", version: "3.5.11.JAKARTA-LIFERAY-PATCHED-1"
	compileOnly group: "com.liferay", name: "org.apache.cxf.rt.frontend.jaxrs", version: "3.5.11.JAKARTA-LIFERAY-PATCHED-1"
	compileOnly group: "com.liferay.jakarta.portlet", name: "com.liferay.jakarta.portlet-api", version: "4.0.0"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.impl", version: "default"
	compileOnly group: "com.liferay.portal", name: "com.liferay.portal.kernel", version: "default"
	compileOnly group: "jakarta.annotation", name: "jakarta.annotation-api", version: "2.1.1"
	compileOnly group: "jakarta.mail", name: "jakarta.mail-api", version: "2.1.3"
	compileOnly group: "jakarta.servlet", name: "jakarta.servlet-api", version: "6.0.0"
	compileOnly group: "org.apache.commons", name: "commons-collections4", version: "4.4"
	compileOnly group: "org.osgi", name: "org.osgi.core", version: "6.0.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.cm", version: "1.6.0"
	compileOnly group: "org.osgi", name: "org.osgi.service.component.annotations", version: "1.4.0"
	compileOnly project(":apps:frontend-taglib:frontend-taglib")
	compileOnly project(":apps:frontend-taglib:frontend-taglib-clay")
	compileOnly project(":apps:frontend-taglib:frontend-taglib-react")
	compileOnly project(":apps:ip-geocoder:ip-geocoder-api")
	compileOnly project(":apps:oauth2-provider:oauth2-provider-api")
	compileOnly project(":apps:oauth2-provider:oauth2-provider-rest-spi")
	compileOnly project(":apps:oauth2-provider:oauth2-provider-scope-api")
	compileOnly project(":apps:oauth2-provider:oauth2-provider-scope-spi")
	compileOnly project(":apps:portal-security:portal-security-service-access-policy-api")
	compileOnly project(":apps:portal:portal-instance-lifecycle-api")
	compileOnly project(":core:osgi-service-tracker-collections")
	compileOnly project(":core:petra:petra-concurrent")
	compileOnly project(":core:petra:petra-executor")
	compileOnly project(":core:petra:petra-function")
	compileOnly project(":core:petra:petra-lang")
	compileOnly project(":core:petra:petra-sql-dsl-api")
	compileOnly project(":core:petra:petra-string")
	compileOnly project(":dxp:apps:osb:osb-faro:osb-faro-api")
	compileOnly project(":dxp:apps:osb:osb-faro:osb-faro-contacts-api")
	compileOnly project(":dxp:apps:osb:osb-faro:osb-faro-engine-client")
	compileOnly project(":dxp:apps:osb:osb-faro:osb-faro-provisioning-client")
}

generateJSPJava {
	enabled = false
}

node {
	global = false
	nodeVersion = "18.18.0"
	useNpm = false
	yarnVersion = "1.22.19"
}

osbYarnInstall {
	doLast {
		delete ".yarnrc"
	}

	workingDir = projectDir
}

osbYarnTest {
	args = [osbYarnInstall.scriptFile, "test"]
	dependsOn osbYarnWebpack
	executable = new File(osbYarnInstall.nodeDir, "bin/node")
	workingDir = projectDir
}

osbYarnWebpack {
	args = [osbYarnInstall.scriptFile, "webpack"]
	dependsOn osbYarnInstall
	executable = new File(osbYarnInstall.nodeDir, "bin/node")
	workingDir = projectDir
}

packageRunTest {
	setActions([])

	dependsOn osbYarnTest
}

packageRunWebpack {
	if (project.hasProperty("faroEnvironmentName")) {
		environment "FARO_ENVIRONMENT_NAME", faroEnvironmentName
	}

	enabled = ((System.getProperty("user.name") != "root") || (System.getProperty("liferay.ci") == "true"))

	inputs.dir "src/main/css"
	inputs.dir "src/main/images"
	inputs.dir "src/main/js"

	outputs.dir "src/main/resources/META-INF/resources/dist"
}

processResources {
	dependsOn packageRunWebpack
}