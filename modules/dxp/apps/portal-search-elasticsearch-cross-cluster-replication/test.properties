##
## Test Suites
##

    modified.files.includes[relevant][portal-search-elasticsearch-cross-cluster-replication-rule]=**

    relevant.rule.names=\
        portal-search-elasticsearch-cross-cluster-replication-rule

    test.batch.names[relevant][portal-search-elasticsearch-cross-cluster-replication-rule]=\
        functional-tomcat90-mysql57,\
        functional-upgrade-tomcat90-mysql57,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*][relevant][portal-search-elasticsearch-cross-cluster-replication-rule]}

    #
    # Relevant
    #

    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][portal-search-elasticsearch-cross-cluster-replication-rule]=\
        dxp/apps/portal-search-elasticsearch-cross-cluster-replication/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][portal-search-elasticsearch-cross-cluster-replication-rule]=\
        dxp/apps/portal-search-elasticsearch-cross-cluster-replication/**/*Test.java

    test.batch.run.property.query[functional-tomcat*-mysql*][relevant][portal-search-elasticsearch-cross-cluster-replication-rule]=\
        (portal.acceptance == true) AND \
        (portal.suite.search.engine ~ "elasticsearch7")

    test.batch.run.property.query[functional-upgrade-tomcat*-mysql*][relevant][portal-search-elasticsearch-cross-cluster-replication-rule]=\
        (portal.suite.search.engine ~ "elasticsearch7") AND \
        (testray.main.component.name ~ "Upgrades Search")

