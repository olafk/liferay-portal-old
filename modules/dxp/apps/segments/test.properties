    modules.includes.required.test.batch.class.names.includes[modules-integration-mysql57-jdk8][relevant][segments-rule]=\
        apps/analytics/**/*Test.java,\
        apps/asset/asset-list-web/**/*Test.java,\
        apps/fragment/fragment-entry-processor/fragment-entry-processor-editable/**/*Test.java,\
        apps/headless/headless-admin-user/**/*Test.java,\
        apps/layout/layout-content-page-editor-web/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][segments-rule]=\
        apps/analytics/**/*Test.java,\
        apps/asset/asset-list-web/**/*Test.java,\
        apps/fragment/fragment-entry-processor/fragment-entry-processor-editable/**/*Test.java,\
        apps/headless/headless-admin-user/**/*Test.java,\
        apps/layout/layout-content-page-editor-web/**/*Test.java

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][segments-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][segments-rule]=\
        (portal.acceptance == true) AND \
        (\
            (testray.component.names ~ "A/B Test") OR \
            (testray.component.names ~ "Personalization") OR \
            (testray.component.names ~ "Segmentation") OR \
            (testray.main.component.name ~ "A/B Test") OR \
            (testray.main.component.name ~ "Content Dashboard") OR \
            (testray.main.component.name ~ "Content Page Templates") OR \
            (testray.main.component.name ~ "Content Pages") OR \
            (testray.main.component.name ~ "Display Page Templates") OR \
            (testray.main.component.name ~ "Fragment Administration") OR \
            (testray.main.component.name ~ "Headless USM") OR \
            (testray.main.component.name ~ "Master Pages") OR \
            (testray.main.component.name ~ "Page Administration") OR \
            (testray.main.component.name ~ "Page Editor") OR \
            (testray.main.component.name ~ "Personalization") OR \
            (testray.main.component.name ~ "Segmentation")\
        )

