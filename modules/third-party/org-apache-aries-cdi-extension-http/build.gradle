import com.liferay.gradle.plugins.patcher.PatchTask

apply plugin: "com.liferay.patcher"

task jarManifest
task jarPatched(type: Zip)
task patch(type: PatchTask)

copyPatchOriginalLibClasses {
	doLast {
		File file = file("classes/META-INF/MANIFEST.MF")

		if (file.exists()) {
			file.text = file.text.replace("org.jboss.weld.module.web.servlet;version=\"[3.0\r\n ,4)\"", "org.jboss.weld.module.web.servlet")
		}
	}
}

dependencies {
	compileOnly group: "org.apache.aries.cdi", name: "org.apache.aries.cdi.extension.http", version: "1.0.3"
}

jar {
	setActions([])

	dependsOn jarPatched
	finalizedBy jarManifest
}

jarManifest {
	doLast {
		ant.jar(destfile: jar.archivePath, update: true)
	}
}

jarPatched {
	archiveFileName = jar.archiveFileName
	destinationDirectory = jar.destinationDirectory
	duplicatesStrategy = "exclude"
	from sourceSets.main.output

	from {
		zipTree(
			configurations.compileOnly.find {
				it.name.startsWith "org.apache.aries.cdi.extension.http-"
			})
	}

	mustRunAfter compileJava
	mustRunAfter generatePomFileForMavenPublication
	mustRunAfter processResources
}

jarSources {
	mustRunAfter patch
}

patch {
	ext {
		autoClean = false
	}

	originalLibModuleName = "org.apache.aries.cdi.extension.http"
}