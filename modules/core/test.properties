##
## Test Suites
##

    modified.files.includes[relevant][core-rule]=**

    relevant.rule.names=\
        core-rule

    test.batch.names[relevant][core-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8,\
        modules-unit-jdk8

    modules.includes.required.test.batch.class.names.includes[modules-integration-*-jdk8][relevant][core-rule]=\
        apps/**/src/testIntegration/**/*Test.java,\
        core/**/src/testIntegration/**/*Test.java

    modules.includes.required.test.batch.class.names.includes[modules-unit-jdk8][relevant][core-rule]=\
        apps/accessibility/**/*Test.java,\
        core/**/*Test.java

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][core-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][core-rule]=\
        (environment.acceptance == true) AND \
        (\
            (app.server.types == null) OR \
            (app.server.types ~ "tomcat")\
        ) AND \
        (\
            (database.types == null) OR \
            (database.types ~ "mysql")\
        ) AND \
        (\
            (operating.system.types == null) OR \
            (operating.system.types ~ "centos")\
        )