##
## Test Suites
##

    modified.files.includes[relevant][portal-impl-rule]=**

    relevant.rule.names=\
        portal-impl-rule

    test.batch.names[relevant][portal-impl-rule]=\
        functional-tomcat90-mysql57-jdk8,\
        modules-integration-mysql57-jdk8

    modules.includes.required.test.batch.class.names.includes[modules-integration-*-jdk8][relevant][portal-impl-rule]=\
        apps/**/src/testIntegration/**/*Test.java

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57-jdk8][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-impl-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*-jdk8][relevant][portal-impl-rule]=\
        (environment.acceptance == true) AND \
        (\
            (app.server.types == null) OR \
            (app.server.types ~ "tomcat")\
        ) AND \
        (\
            (database.types == null) OR \
            (database.types ~ "mysql")\
        ) AND \
        (\
            (operating.system.types == null) OR \
            (operating.system.types ~ "centos")\
        ) OR \
        (\
            (liferay.online.properties == true) AND \
            (testray.main.component.name == "File Install")\
        )

##
## Testray
##

    testray.main.component.name=Portal Services