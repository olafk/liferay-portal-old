##
## Test Suites
##

    modified.files.includes[relevant][portal-kernel-rule]=**

    modules.includes.required.test.batch.class.names.includes[modules-integration-*-jdk8][relevant][portal-kernel-rule]=\
        apps/**/src/testIntegration/**/*Test.java

    relevant.rule.names=\
        portal-kernel-rule

    test.batch.names[relevant][portal-kernel-rule]=\
        functional-tomcat90-mysql57,\
        modules-integration-mysql57-jdk8

    #
    # Portal Hotfix Release
    #

    test.batch.run.property.query[functional-bundle-tomcat-mysql57][test-portal-hotfix-release]=\
        ${test.batch.run.property.query[functional-tomcat*-mysql*][relevant][portal-kernel-rule]}

    #
    # Relevant
    #

    test.batch.run.property.query[functional-tomcat*-mysql*][relevant][portal-kernel-rule]=\
        (environment.acceptance == true) AND \
        (\
            (app.server.types == null) OR \
            (app.server.types ~ "tomcat")\
        ) AND \
        (\
            (database.types == null) OR \
            (database.types ~ "mysql")\
        ) AND \
        (\
            (operating.system.types == null) OR \
            (operating.system.types ~ "centos")\
        )

##
## Testray
##

    testray.main.component.name=Portal Services